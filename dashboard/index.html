<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Office</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f2f0ec;
      --surface: rgba(255,255,255,0.72);
      --glass-border: rgba(0,0,0,0.07);
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --text-tertiary: #aeaeb2;
      --accent: #0071e3;
      --accent-green: #30d158;
      --accent-red: #ff453a;
      --radius-sm: 8px;
      --radius-md: 12px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
      --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', ui-monospace, monospace;
    }

    body {
      background-color: var(--bg);
      background-image: radial-gradient(circle, rgba(0,0,0,0.05) 1px, transparent 1px);
      background-size: 24px 24px;
      color: var(--text-primary);
      font-family: var(--font);
      min-height: 100vh;
    }

    /* ---- HEADER ---- */
    #header {
      background: rgba(242,240,236,0.88);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid var(--glass-border);
      padding: 0 1.5rem;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    #header-left { display: flex; align-items: center; gap: 10px; }
    #header h1 {
      font-family: var(--font);
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }
    #live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent-green);
      animation: livePulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(48,209,88,0.5); }
      50% { opacity: 0.85; box-shadow: 0 0 0 5px rgba(48,209,88,0); }
    }

    .glass-btn {
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(0,0,0,0.09);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: background 0.15s, box-shadow 0.15s;
      box-shadow: var(--shadow-sm);
    }
    .glass-btn:hover { background: rgba(255,255,255,0.96); box-shadow: var(--shadow-md); }

    /* ---- TASK PANEL ---- */
    #task-panel {
      display: none;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      padding: 1.5rem 2rem;
    }
    #task-panel.visible { display: block; }
    #task-panel h2 { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 1.25rem; }

    #task-form {
      background: rgba(255,255,255,0.85);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow-sm);
    }
    #task-form-title {
      font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--text-secondary); margin-bottom: 0.75rem;
    }
    .task-form-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
    .task-form-label { font-size: 12px; color: var(--text-secondary); width: 42px; flex-shrink: 0; }
    .task-input {
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 13px;
      padding: 6px 10px;
      flex: 1; min-width: 160px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .task-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,0.15); }
    .task-select {
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 13px;
      padding: 6px 10px;
      cursor: pointer;
    }
    .task-select:focus { outline: none; border-color: var(--accent); }
    .task-btn {
      background: var(--accent); border: none; border-radius: var(--radius-sm);
      color: #fff; font-family: var(--font); font-size: 13px; font-weight: 500;
      padding: 6px 14px; cursor: pointer; transition: opacity 0.15s; white-space: nowrap;
    }
    .task-btn:hover { opacity: 0.85; }
    .task-btn-done {
      background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.08);
      border-radius: var(--radius-sm); color: var(--text-secondary);
      font-family: var(--font); font-size: 11px; padding: 3px 8px;
      cursor: pointer; transition: background 0.15s;
    }
    .task-btn-done:hover { background: rgba(0,0,0,0.09); }
    .task-btn-assign {
      background: rgba(0,113,227,0.1); border: 1px solid rgba(0,113,227,0.2);
      border-radius: var(--radius-sm); color: var(--accent);
      font-family: var(--font); font-size: 11px; padding: 3px 8px;
      cursor: pointer; transition: background 0.15s;
    }
    .task-btn-assign:hover { background: rgba(0,113,227,0.18); }
    .run-btn {
      background: rgba(48,209,88,0.12); border: 1px solid rgba(48,209,88,0.3);
      border-radius: var(--radius-sm); color: #1a7a38;
      font-family: var(--font); font-size: 11px; font-weight: 500;
      padding: 3px 10px; cursor: pointer; transition: background 0.15s;
    }
    .run-btn:hover { background: rgba(48,209,88,0.22); }

    #terminal-panel {
      margin-top: 1rem;
      background: rgba(255,255,255,0.85);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      box-shadow: var(--shadow-sm);
    }
    #terminal-header {
      display: flex; justify-content: space-between;
      padding: 0.5rem 0.875rem; border-bottom: 1px solid var(--glass-border);
      color: var(--text-secondary); font-family: var(--font); font-size: 12px; font-weight: 500;
    }
    #terminal-output {
      height: 220px; overflow-y: auto;
      padding: 0.875rem; color: var(--text-primary);
      white-space: pre-wrap; word-break: break-all; line-height: 1.6;
    }
    #terminal-output::-webkit-scrollbar { width: 4px; }
    #terminal-output::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }
    #terminal-status {
      padding: 0.4rem 0.875rem; border-top: 1px solid var(--glass-border);
      color: var(--text-tertiary); font-size: 11px; font-family: var(--font);
    }

    #task-columns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .task-col-header {
      font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
      text-transform: uppercase; color: var(--text-secondary);
      margin-bottom: 0.5rem; padding-bottom: 6px; border-bottom: 1px solid var(--glass-border);
    }
    .task-card {
      background: rgba(255,255,255,0.88); border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm); padding: 0.625rem 0.75rem; margin-bottom: 0.5rem;
      box-shadow: var(--shadow-sm); transition: box-shadow 0.15s, transform 0.1s;
    }
    .task-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .task-card-name {
      color: var(--text-primary); font-size: 13px; font-weight: 500; margin-bottom: 4px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .task-card-agent { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; }
    .task-agent-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .task-card-actions { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .task-col-empty { font-size: 12px; color: var(--text-tertiary); font-style: italic; }
    #task-error { font-size: 12px; color: var(--accent-red); margin-top: 0.5rem; }
    #task-form-error { font-size: 11px; color: var(--accent-red); margin-top: 4px; }

    /* ---- MAIN ---- */
    #main { display: flex; flex-direction: row; overflow-x: auto; }
    #canvas-wrap { position: relative; flex-shrink: 0; }
    #game-canvas { display: block; }

    /* ---- SIDEBAR ---- */
    #sidebar {
      width: 280px; flex-shrink: 0;
      height: 672px;
      position: relative;
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border-left: 1px solid var(--glass-border);
    }
    #sidebar-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 36px;
      background: rgba(255,255,255,0.5); border-bottom: 1px solid var(--glass-border);
      padding: 0 14px;
      display: flex; align-items: center;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.3px; text-transform: uppercase;
      color: var(--text-secondary);
    }
    #activity-log {
      position: absolute;
      top: 36px; bottom: 220px;
      left: 0; right: 0;
      overflow-y: auto;
      padding: 8px 10px;
    }
    #activity-log::-webkit-scrollbar { width: 3px; }
    #activity-log::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }
    .log-entry {
      font-size: 11px; line-height: 1.5;
      padding: 6px 8px;
      margin-bottom: 5px;
      background: rgba(255,255,255,0.72);
      border-radius: var(--radius-sm);
      border: 1px solid rgba(0,0,0,0.04);
    }
    .log-ts { color: var(--text-tertiary); font-size: 10px; }
    .log-agent-line { display: flex; align-items: center; gap: 5px; margin-top: 2px; }
    .log-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .log-from { font-weight: 600; font-size: 11px; }
    .log-arrow { color: var(--text-tertiary); }
    .log-to { color: var(--text-secondary); }
    .log-text { color: var(--text-secondary); font-size: 10px; padding-left: 12px; font-style: italic; }

    #agent-status-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 220px;
      overflow-y: auto;
      border-top: 1px solid var(--glass-border);
      padding: 8px 10px;
      background: rgba(255,255,255,0.62);
    }
    #agent-status-panel h3 {
      font-size: 10px; font-weight: 600; letter-spacing: 0.3px;
      text-transform: uppercase; color: var(--text-secondary); margin-bottom: 6px;
    }
    .status-agent-row { display: flex; align-items: center; gap: 7px; font-size: 11px; padding: 2px 0; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .status-agent-name { flex: 1; color: var(--text-primary); }
    .status-state { font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; }
    .status-state.working { color: #1a7a38; font-weight: 600; }
    .status-state.talking { color: #b45309; }
    .status-state.walking { color: var(--accent); }
    .status-state.idle { color: var(--text-tertiary); }

    /* ---- TOGGLE BAR ---- */
    #toggle-bar {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--glass-border);
      border-left: none; border-right: none; border-bottom: none;
      padding: 10px 20px; display: flex; align-items: center; gap: 10px;
      cursor: pointer; user-select: none; width: 100%;
      color: var(--text-secondary); font-family: var(--font);
      font-size: 12px; font-weight: 500; text-align: left;
      transition: background 0.15s;
    }
    #toggle-bar:hover { background: rgba(255,255,255,0.88); }
    #toggle-arrow { transition: transform 0.2s; font-size: 10px; color: var(--text-tertiary); }
    #toggle-arrow.open { transform: rotate(180deg); }

    /* ---- TECHNICAL PANEL ---- */
    #tech-panel {
      display: none;
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--glass-border);
      padding: 1.5rem 2rem;
    }
    #tech-panel.visible { display: block; }
    #tech-panel h2 { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 1.25rem; }
    .tech-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .tech-card {
      background: rgba(255,255,255,0.88);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 1rem 1.25rem;
      box-shadow: var(--shadow-sm);
    }
    .tech-card h3 { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 0.75rem; }
    .tech-badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 10px; border-radius: 999px; background: rgba(0,113,227,0.1); color: var(--accent); border: 1px solid rgba(0,113,227,0.2); margin-bottom: 8px; }
    .tech-phase { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
    .tech-summary { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
    .tech-date { font-size: 10px; color: var(--text-tertiary); margin-top: 8px; }
    .tech-tag { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 999px; background: rgba(0,0,0,0.05); color: var(--text-secondary); border: 1px solid var(--glass-border); margin: 2px; }
    .tech-update-list { list-style: none; }
    .tech-update-list li { padding: 5px 0; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 12px; display: flex; gap: 0.75rem; }
    .tech-update-list li:last-child { border-bottom: none; }
    .tech-date-col { color: var(--text-tertiary); font-size: 10px; white-space: nowrap; padding-top: 2px; }
    .tech-note-col { color: var(--text-secondary); }
    .tech-agent-row { display: flex; gap: 0.75rem; padding: 5px 0; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 12px; }
    .tech-agent-row:last-child { border-bottom: none; }
    .tech-agent-name { font-weight: 600; min-width: 100px; color: var(--text-primary); text-transform: capitalize; }
    .tech-agent-note { color: var(--text-secondary); }
    #tech-load-btn {
      background: rgba(255,255,255,0.88); border: 1px solid rgba(0,0,0,0.1);
      border-radius: var(--radius-sm); color: var(--text-primary);
      font-family: var(--font); font-size: 13px; font-weight: 500;
      padding: 7px 16px; cursor: pointer; box-shadow: var(--shadow-sm); transition: box-shadow 0.15s;
    }
    #tech-load-btn:hover { box-shadow: var(--shadow-md); }
    #tech-error { color: var(--accent-red); font-size: 12px; margin-top: 6px; }
    #tech-dashboard { display: none; }
    #tech-dashboard.visible { display: block; }

    /* ---- TOOLTIP ---- */
    #agent-tooltip {
      position: fixed;
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font); font-size: 12px; font-weight: 500;
      padding: 5px 12px; pointer-events: none; display: none;
      z-index: 999; white-space: nowrap; box-shadow: var(--shadow-md);
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="header-left">
    <div id="live-dot"></div>
    <h1>AI Office</h1>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <button class="glass-btn" onclick="toggleTasks()">Task Manager</button>
    <button class="glass-btn" onclick="toggleTech()">Behind the Scenes</button>
  </div>
</div>

<!-- MAIN: canvas + sidebar -->
<div id="main">
  <div id="canvas-wrap">
    <canvas id="game-canvas" width="1056" height="672"></canvas>
  </div>
  <div id="sidebar">
    <div id="sidebar-header">Activity</div>
    <div id="activity-log"></div>
    <div id="agent-status-panel">
      <h3>Agents</h3>
      <div id="status-rows"></div>
    </div>
  </div>
</div>

<!-- TOGGLE BAR -->
<button id="toggle-bar" onclick="toggleTech()">
  <span id="toggle-arrow">&#9660;</span>
  <span>Behind the Scenes &mdash; Technical Dashboard</span>
</button>

<!-- TASK MANAGER PANEL -->
<div id="task-panel">
  <h2>Task Manager</h2>
  <div id="task-form">
    <div id="task-form-title">New Task — delivered to Orchestrator</div>
    <div class="task-form-row">
      <input id="tf-title" class="task-input" type="text" placeholder="Describe the task..." />
      <button class="task-btn" onclick="handleCreateTask()">+ Add</button>
    </div>
    <div id="task-form-error"></div>
  </div>
  <div id="task-error"></div>
  <div id="task-columns">
    <div>
      <div class="task-col-header">Backlog</div>
      <div id="task-col-backlog"></div>
    </div>
    <div>
      <div class="task-col-header">Active</div>
      <div id="task-col-active"></div>
    </div>
    <div>
      <div class="task-col-header">Completed</div>
      <div id="task-col-completed"></div>
    </div>
  </div>
  <div id="terminal-panel" style="display:none;">
    <div id="terminal-header">
      <span id="terminal-title">Agent Output</span>
      <button onclick="closeTerminal()" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:1rem;line-height:1;">&#10005;</button>
    </div>
    <div id="terminal-output"></div>
    <div id="terminal-status"></div>
  </div>
</div>

<!-- TECHNICAL PANEL -->
<div id="tech-panel">
  <h2>Technical Dashboard</h2>
  <div style="margin-bottom:1rem;">
    <button id="tech-load-btn" onclick="loadMemory()">Load team_memory.json</button>
    <div id="tech-error"></div>
  </div>
  <div id="tech-dashboard">
    <div class="tech-grid">
      <div class="tech-card">
        <h3>Project Status</h3>
        <div class="tech-badge" id="t-badge">—</div>
        <div class="tech-phase" id="t-phase">—</div>
        <div class="tech-summary" id="t-summary">—</div>
        <div class="tech-date">Last updated: <span id="t-date">—</span></div>
      </div>
      <div class="tech-card">
        <h3>Active Decisions</h3>
        <div id="t-decisions">—</div>
      </div>
      <div class="tech-card">
        <h3>Recent Updates</h3>
        <ul class="tech-update-list" id="t-updates"></ul>
      </div>
      <div class="tech-card">
        <h3>Agent Notes</h3>
        <div id="t-agent-notes"></div>
      </div>
    </div>
  </div>
</div>

<div id="agent-tooltip"></div>

<script>
// ---- AUTH GATE ----
if (!sessionStorage.getItem('authenticated')) {
  window.location.replace('/dashboard/login.html');
}

// ============================================================
// CONSTANTS
// ============================================================
const CANVAS_W = 1056;
const CANVAS_H = 672;
const PIXEL = 3;
const TILE = 16;
const GRID_W = 22;
const GRID_H = 14;
const FPS = 30;
const FRAME_MS = 1000 / FPS;

const AGENT_COLORS = {
  orchestrator: { primary: '#8b5cf6', name: 'Orchestrator', role: 'Routing & coordination' },
  arve:         { primary: '#3b82f6', name: 'Arve',         role: 'Coding' },
  bjorn:        { primary: '#0ea5e9', name: 'Bjørn',        role: 'Architecture' },
  dag:          { primary: '#1d4ed8', name: 'Dag',          role: 'DevOps' },
  else:         { primary: '#10b981', name: 'Else',         role: 'Research' },
  frode:        { primary: '#f59e0b', name: 'Frode',        role: 'Sprint planning' },
  halvard:      { primary: '#f97316', name: 'Halvard',      role: 'Growth' },
  guro:         { primary: '#14b8a6', name: 'Guro',         role: 'Social media' },
  jorunn:       { primary: '#0d9488', name: 'Jorunn',       role: 'Branding' },
  ingrid:       { primary: '#d97706', name: 'Ingrid',       role: 'UI/UX' },
  knut:         { primary: '#ca8a04', name: 'Knut',         role: 'Project tracking' },
  laila:        { primary: '#ef4444', name: 'Laila',        role: 'Support' },
  magnus:       { primary: '#dc2626', name: 'Magnus',       role: 'Legal' },
  nora:         { primary: '#a855f7', name: 'Nora',         role: 'Finance' },
  odd:          { primary: '#64748b', name: 'Odd',          role: 'API testing' },
  per:          { primary: '#475569', name: 'Per',          role: 'Benchmarking' },
};

const DESKS = {
  orchestrator: { tx: 2,  ty: 1  },
  arve:         { tx: 7,  ty: 1  },
  bjorn:        { tx: 13, ty: 1  },
  dag:          { tx: 18, ty: 1  },
  else:         { tx: 2,  ty: 4  },
  frode:        { tx: 7,  ty: 4  },
  halvard:      { tx: 13, ty: 4  },
  guro:         { tx: 18, ty: 4  },
  jorunn:       { tx: 2,  ty: 8  },

  { from: 'orchestrator', to: 'arve',    text: 'New task in queue.' },
  { from: 'orchestrator', to: 'else',    text: 'Research needed.' },
  { from: 'orchestrator', to: 'frode',   text: 'Break down milestone.' },

// ============================================================
// HELPERS
// ============================================================
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return { r, g, b };
}
function gx(x) { return Math.floor(x) * PIXEL; }
function gy(y) { return Math.floor(y) * PIXEL; }
function tileX(tx) { return tx * TILE; }
function tileY(ty) { return ty * TILE; }
function randi(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function randf(min, max) { return Math.random() * (max - min) + min; }
function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ============================================================
// AGENT INITIALIZATION
// ============================================================
function makeAgents() {
  return Object.keys(AGENT_COLORS).map(id => {
    const desk = DESKS[id];
    const startX = tileX(desk.tx) + TILE / 2;
    const rawY = tileY(desk.ty) + TILE + 4;
    const startY = Math.min(rawY, tileY(8) + TILE - 6);
    return {
      id, x: startX, y: startY, targetX: startX, targetY: startY,
      state: 'idle', stateTimer: randi(180, 360),
      bubble: null, walkFrame: 0, walkTick: 0, facing: 'down',
      cursorTick: 0, cursorVisible: false,
      pendingState: null, pendingMsg: null, pendingTarget: null,
    };
  });
}
let agents = makeAgents();

// ============================================================
// GAME LOGIC
// ============================================================
function deskStandPos(agentId) {
  const desk = DESKS[agentId];
  const rawY = tileY(desk.ty) + TILE + TILE / 2;
  return {
    x: tileX(desk.tx) + TILE / 2,
    y: Math.min(rawY, tileY(12) + TILE - 6),
  };
}
function meetingTableCenter() {
  return { x: tileX(10) + TILE / 2, y: tileY(7) };
}
function randomFloorPos() {
  let tx, ty;
  do {
    tx = randi(1, 20); ty = randi(1, 12);
  } while (
    (tx >= 9 && tx <= 12 && ty >= 6 && ty <= 8) ||
    Object.values(DESKS).some(d => d.tx === tx && d.ty === ty)
  );
  return { x: tileX(tx) + TILE / 2, y: tileY(ty) + TILE / 2 };
}
function dist(ax, ay, bx, by) {
  const dx = ax - bx, dy = ay - by;
  return Math.sqrt(dx*dx + dy*dy);
}

function tickAgents() {
  for (const agent of agents) {
    if (agent.state === 'walking') {
      const dx = agent.targetX - agent.x;
      const dy = agent.targetY - agent.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      const speed = 0.7;
      if (d < speed + 0.1) {
        agent.x = agent.targetX; agent.y = agent.targetY;
        agent.walkFrame = 0; agent.walkTick = 0;
        if (agent.pendingState === 'working') {
          agent.state = 'working'; agent.stateTimer = randi(90, 180);
          const selfMsg = MESSAGES.find(m => m.from === agent.id && m.to === agent.id);
          if (selfMsg) { agent.bubble = { text: selfMsg.text, timer: 90 }; addLog(agent.id, null, selfMsg.text); }
        } else if (agent.pendingState === 'talking') {
          agent.state = 'talking'; agent.stateTimer = randi(60, 120);
          const targetAgent = agents.find(a => a.id === agent.pendingTarget);
          if (targetAgent && agent.pendingMsg) {
            agent.bubble = { text: agent.pendingMsg.text, timer: 100 };
            if (targetAgent) {
              const replyOptions = MESSAGES.filter(m => m.from === targetAgent.id && m.to !== targetAgent.id);
              if (replyOptions.length > 0) {
                const reply = pickRandom(replyOptions);
                setTimeout(() => { if (targetAgent.bubble === null) targetAgent.bubble = { text: reply.text, timer: 80 }; }, 1200);
              }
            }
            addLog(agent.id, agent.pendingTarget, agent.pendingMsg.text);
          }
          agent.pendingTarget = null; agent.pendingMsg = null;
        } else if (agent.pendingState === 'meeting') {
          agent.state = 'talking'; agent.stateTimer = randi(90, 150);
          const mtg = MESSAGES.filter(m => m.from === agent.id);
          if (mtg.length > 0) { const m = pickRandom(mtg); agent.bubble = { text: m.text, timer: 90 }; }
        } else {
          agent.state = 'idle'; agent.stateTimer = randi(30, 90);
        }
        agent.pendingState = null;
      } else {
        agent.x += (dx / d) * speed; agent.y += (dy / d) * speed;
        if (Math.abs(dx) > Math.abs(dy)) agent.facing = dx > 0 ? 'right' : 'left';
        else agent.facing = dy > 0 ? 'down' : 'up';
        agent.walkTick++;
        if (agent.walkTick >= 12) { agent.walkTick = 0; agent.walkFrame = agent.walkFrame === 0 ? 1 : 0; }
      }
    } else {
      if (runningAgents.has(agent.id)) {
        agent.state = 'working'; agent.stateTimer = 999;
      } else {
        agent.stateTimer--;
        if (agent.stateTimer <= 0) {
          if (agent.state === 'talking') {
            // Return to own desk after conversation
            agent.bubble = null;
            const pos = deskStandPos(agent.id);
            startWalking(agent, pos.x, pos.y, 'idle');
          } else if (agent.state === 'working') {
            agent.state = 'idle'; agent.bubble = null; agent.stateTimer = randi(120, 240);
          } else if (agent.state === 'idle') { decideNextAction(agent); }
        }
        if (agent.state === 'working') {
          agent.cursorTick++;
          if (agent.cursorTick >= 18) { agent.cursorTick = 0; agent.cursorVisible = !agent.cursorVisible; }
        } else { agent.cursorVisible = false; agent.cursorTick = 0; }
      }
    }
    if (agent.bubble) {
      agent.bubble.timer--;
      if (agent.bubble.timer <= 0) agent.bubble = null;
    }
  }
}

function decideNextAction(agent) {
  const roll = Math.random();
  if (roll < 0.85) {
    // Stay at / return to own desk
    const pos = deskStandPos(agent.id);
    agent.x = pos.x; agent.y = pos.y;
    agent.state = 'idle';
    agent.stateTimer = randi(120, 300);
  } else {
    // Walk to another agent's desk to deliver a message, then return
    const msgs = MESSAGES.filter(m => m.from === agent.id && m.to !== agent.id);
    if (msgs.length === 0) {
      agent.state = 'idle'; agent.stateTimer = randi(120, 300); return;
    }
    const msg = pickRandom(msgs);
    const pos = deskStandPos(msg.to);
    agent.pendingTarget = msg.to; agent.pendingMsg = msg;
    startWalking(agent, pos.x + randi(-5, 5), pos.y - 4, 'talking');
  }
}

function startWalking(agent, tx, ty, nextState) {
  const minX = tileX(1) + 4, maxX = tileX(20) + TILE - 4;
  const minY = tileY(1) + 4, maxY = tileY(12) + TILE - 4;
  agent.targetX = Math.max(minX, Math.min(maxX, tx));
  agent.targetY = Math.max(minY, Math.min(maxY, ty));
  agent.state = 'walking'; agent.pendingState = nextState; agent.bubble = null;
}

// ============================================================
// DRAWING — Light / Glass aesthetic
// ============================================================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

// Floor palette
const FLOOR_A     = '#f5f1ea';
const FLOOR_B     = '#ede8df';
const WALL_COLOR  = '#e0d9cf';
const WINDOW_GLASS = '#dbeafe';
const DESK_WHITE  = '#ffffff';
const TABLE_BG    = '#f0ece4';
const TABLE_EDGE  = 'rgba(0,0,0,0.09)';
const CHAIR_COLOR = '#e8e2d8';
const PLANT_GREEN = '#6b9e82';
const PLANT_POT   = '#b8845a';

function drawRect(gxPos, gyPos, gw, gh, color) {
  ctx.fillStyle = color;
  ctx.fillRect(gx(gxPos), gy(gyPos), gw * PIXEL, gh * PIXEL);
}

function drawFloor() {
  for (let ty = 1; ty <= 12; ty++) {
    for (let tx = 1; tx <= 20; tx++) {
      const color = (tx + ty) % 2 === 0 ? FLOOR_A : FLOOR_B;
      drawRect(tileX(tx), tileY(ty), TILE, TILE, color);
    }
  }
}

function drawWalls() {
  for (let tx = 0; tx < GRID_W; tx++) {
    drawRect(tileX(tx), tileY(0), TILE, TILE, WALL_COLOR);
    // subtle baseboard shadow
    ctx.fillStyle = 'rgba(0,0,0,0.04)';
    ctx.fillRect(gx(tileX(tx)), gy(tileY(0) + TILE - 1), TILE * PIXEL, PIXEL);
  }
  for (let tx = 0; tx < GRID_W; tx++) drawRect(tileX(tx), tileY(13), TILE, TILE, WALL_COLOR);
  for (let ty = 0; ty < GRID_H; ty++) drawRect(tileX(0), tileY(ty), TILE, TILE, WALL_COLOR);
  for (let ty = 0; ty < GRID_H; ty++) drawRect(tileX(21), tileY(ty), TILE, TILE, WALL_COLOR);
}

function drawWallDetails() {
  const windowPositions = [3, 7, 11, 15, 19];
  for (const wx of windowPositions) {
    // Frame
    ctx.fillStyle = '#ccc6bc';
    ctx.fillRect(gx(tileX(wx) + 2), gy(tileY(0) + 2), 12 * PIXEL, 12 * PIXEL);
    // Glass
    ctx.fillStyle = WINDOW_GLASS;
    ctx.fillRect(gx(tileX(wx) + 3), gy(tileY(0) + 3), 10 * PIXEL, 10 * PIXEL);
    // Reflection
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.fillRect(gx(tileX(wx) + 3), gy(tileY(0) + 3), 4 * PIXEL, 2 * PIXEL);
    // Cross bars
    ctx.fillStyle = 'rgba(180,175,168,0.7)';
    ctx.fillRect(gx(tileX(wx) + 3), gy(tileY(0) + 8), 10 * PIXEL, PIXEL);
    ctx.fillRect(gx(tileX(wx) + 8), gy(tileY(0) + 3), PIXEL, 10 * PIXEL);
  }
}

function drawDesk(tx, ty, agentId) {
  const deskX = gx(tileX(tx) - 1);
  const deskY = gy(tileY(ty) + 2);
  const deskW = (TILE + 2) * PIXEL;
  const deskH = (TILE - 5) * PIXEL;

  // Drop shadow
  ctx.fillStyle = 'rgba(0,0,0,0.07)';
  ctx.fillRect(deskX + 2, deskY + 3, deskW, deskH);

  // White surface
  ctx.fillStyle = DESK_WHITE;
  ctx.fillRect(deskX, deskY, deskW, deskH);

  // Agent color accent bar (top)
  const col = AGENT_COLORS[agentId];
  if (col) {
    ctx.fillStyle = col.primary;
    ctx.fillRect(deskX, deskY, deskW, 3 * PIXEL);
  }

  // Desk border
  ctx.strokeStyle = 'rgba(0,0,0,0.08)';
  ctx.lineWidth = 1;
  ctx.strokeRect(deskX + 0.5, deskY + 0.5, deskW - 1, deskH - 1);

  // Monitor bezel
  ctx.fillStyle = '#ede8e0';
  ctx.fillRect(gx(tileX(tx) + 3), gy(tileY(ty) + 4), 8 * PIXEL, 5 * PIXEL);

  // Screen glow
  if (col) {
    const { r, g, b } = hexToRgb(col.primary);
    ctx.fillStyle = `rgba(${r},${g},${b},0.22)`;
    ctx.fillRect(gx(tileX(tx) + 4), gy(tileY(ty) + 5), 6 * PIXEL, 3 * PIXEL);
  }
}

function drawMeetingTable() {
  const tX = gx(tileX(9) + 2);
  const tY = gy(tileY(6) + 2);
  const tW = (TILE * 4 - 4) * PIXEL;
  const tH = (TILE * 3 - 4) * PIXEL;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  ctx.fillRect(tX + 3, tY + 4, tW, tH);

  // Surface
  ctx.fillStyle = TABLE_BG;
  ctx.fillRect(tX, tY, tW, tH);

  // Border
  ctx.strokeStyle = TABLE_EDGE;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(tX + 0.75, tY + 0.75, tW - 1.5, tH - 1.5);

  // Chairs
  const chairPositions = [
    { x: tileX(9) + 4,  y: tileY(6) - 3 }, { x: tileX(10) + 4, y: tileY(6) - 3 },
    { x: tileX(11) + 4, y: tileY(6) - 3 }, { x: tileX(12) + 4, y: tileY(6) - 3 },
    { x: tileX(9) + 4,  y: tileY(8) + TILE }, { x: tileX(10) + 4, y: tileY(8) + TILE },
    { x: tileX(11) + 4, y: tileY(8) + TILE }, { x: tileX(12) + 4, y: tileY(8) + TILE },
  ];
  for (const c of chairPositions) {
    ctx.fillStyle = CHAIR_COLOR;
    ctx.fillRect(gx(c.x), gy(c.y), 8 * PIXEL, 4 * PIXEL);
    ctx.strokeStyle = 'rgba(0,0,0,0.06)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(gx(c.x) + 0.25, gy(c.y) + 0.25, 8 * PIXEL - 0.5, 4 * PIXEL - 0.5);
  }
}

function drawPlant(tx, ty) {
  const cx = gx(tileX(tx) + 8);
  const cy = gy(tileY(ty) + 9);
  const R  = 5 * PIXEL;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.07)';
  ctx.beginPath();
  ctx.ellipse(cx + 2, cy + 2, R, R * 0.7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = PLANT_GREEN;
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.fill();

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.beginPath();
  ctx.arc(cx - R * 0.3, cy - R * 0.35, R * 0.38, 0, Math.PI * 2);
  ctx.fill();

  // Pot
  ctx.fillStyle = PLANT_POT;
  ctx.fillRect(cx - 3 * PIXEL, cy + R - PIXEL, 6 * PIXEL, 3 * PIXEL);
}

function drawFurniture() {
  for (const [agentId, desk] of Object.entries(DESKS)) drawDesk(desk.tx, desk.ty, agentId);
  drawMeetingTable();
  drawPlant(1, 1); drawPlant(20, 1); drawPlant(1, 12); drawPlant(20, 12);
}

// Agent: circle avatar with initials
function drawAgentSprite(cx, cy, agentId, walkFrame) {
  const col = AGENT_COLORS[agentId];
  if (!col) return;

  const cxPx = gx(cx);
  const cyPx = gy(cy);
  const R = 11;                      // avatar radius in canvas px
  const avatarCY = cyPx - R * 2;    // circle center (above "feet")

  // Pulsing outer ring when running
  if (runningAgents.has(agentId)) {
    const pulse = 0.35 + 0.28 * Math.sin(Date.now() / 280);
    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.strokeStyle = col.primary;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(cxPx, avatarCY, R + 7, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  // Drop shadow
  ctx.fillStyle = 'rgba(0,0,0,0.10)';
  ctx.beginPath();
  ctx.ellipse(cxPx + 1, avatarCY + 2, R, R * 0.65, 0, 0, Math.PI * 2);
  ctx.fill();

  // Avatar fill
  const { r, g, b } = hexToRgb(col.primary);
  ctx.fillStyle = `rgba(${r},${g},${b},0.14)`;
  ctx.beginPath();
  ctx.arc(cxPx, avatarCY, R, 0, Math.PI * 2);
  ctx.fill();

  // Border ring
  ctx.strokeStyle = col.primary;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cxPx, avatarCY, R, 0, Math.PI * 2);
  ctx.stroke();

  // Initials
  ctx.fillStyle = col.primary;
  ctx.font = `bold 9px -apple-system, BlinkMacSystemFont, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(col.name.slice(0, 2).toUpperCase(), cxPx, avatarCY);

  // Name label below
  ctx.fillStyle = 'rgba(29,29,31,0.62)';
  ctx.font = `9px -apple-system, BlinkMacSystemFont, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(col.name, cxPx, cyPx - 1);
}

function drawBubble(cx, cy, text) {
  const maxChars = 22;
  const words = text.split(' ');
  const lines = [];
  let current = '';
  for (const word of words) {
    const candidate = current ? current + ' ' + word : word;
    if (candidate.length > maxChars) { if (current) lines.push(current); current = word; }
    else current = candidate;
  }
  if (current) lines.push(current);

  const FONT_SIZE = 10;
  ctx.font = `500 ${FONT_SIZE}px -apple-system, BlinkMacSystemFont, sans-serif`;
  ctx.textBaseline = 'top';
  let maxW = 0;
  for (const line of lines) { const w = ctx.measureText(line).width; if (w > maxW) maxW = w; }

  const PAD_X = 8, PAD_Y = 5, LINE_H = FONT_SIZE + 3;
  const bw = maxW + PAD_X * 2;
  const bh = lines.length * LINE_H + PAD_Y * 2;

  const bubbleBottomY = gy(cy - 12) - 8;
  const bubbleTopY = bubbleBottomY - bh;
  const bubbleLeftX = gx(cx) - Math.floor(bw / 2);
  const clampedX = Math.max(2, Math.min(CANVAS_W - bw - 2, bubbleLeftX));
  const clampedY = Math.max(2, bubbleTopY);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.07)';
  ctx.fillRect(clampedX + 2, clampedY + 3, bw, bh);

  // Background
  ctx.fillStyle = 'rgba(255,255,255,0.96)';
  ctx.fillRect(clampedX, clampedY, bw, bh);

  // Border
  ctx.strokeStyle = 'rgba(0,0,0,0.09)';
  ctx.lineWidth = 1;
  ctx.strokeRect(clampedX + 0.5, clampedY + 0.5, bw - 1, bh - 1);

  // Tail
  const tailCX = gx(cx);
  ctx.fillStyle = 'rgba(255,255,255,0.96)';
  ctx.beginPath();
  ctx.moveTo(Math.max(clampedX + 4, tailCX - 4), bubbleBottomY);
  ctx.lineTo(Math.min(clampedX + bw - 4, tailCX + 4), bubbleBottomY);
  ctx.lineTo(tailCX, bubbleBottomY + 6);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.09)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(Math.max(clampedX + 4, tailCX - 4), bubbleBottomY);
  ctx.lineTo(tailCX, bubbleBottomY + 6);
  ctx.lineTo(Math.min(clampedX + bw - 4, tailCX + 4), bubbleBottomY);
  ctx.stroke();

  // Text
  ctx.fillStyle = '#1d1d1f';
  ctx.font = `500 ${FONT_SIZE}px -apple-system, BlinkMacSystemFont, sans-serif`;
  ctx.textBaseline = 'top'; ctx.textAlign = 'left';
  for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], clampedX + PAD_X, clampedY + PAD_Y + i * LINE_H);
}

function drawAgents() {
  const sorted = [...agents].sort((a, b) => a.y - b.y);
  for (const agent of sorted) {
    const cx = Math.round(agent.x), cy = Math.round(agent.y);
    drawAgentSprite(cx, cy, agent.id, agent.walkFrame);
    if (agent.bubble) drawBubble(cx, cy, agent.bubble.text);
  }
}

function draw() {
  // Warm off-white canvas background
  ctx.fillStyle = '#f6f2eb';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  drawWalls();
  drawWallDetails();
  drawFloor();
  drawFurniture();
  drawAgents();
}

const activityLog = document.getElementById('activity-log');
const MAX_LOG = 50;
let logEntries = [];

function padZero(n) { return String(n).padStart(2, '0'); }
function getTimestamp() {
  const now = new Date();
  return `${padZero(now.getHours())}:${padZero(now.getMinutes())}:${padZero(now.getSeconds())}`;
}
function addLog(fromId, toId, text) {
  const fromColor = AGENT_COLORS[fromId]?.primary || '#888';
  const fromName  = AGENT_COLORS[fromId]?.name || fromId;
  const toName    = toId ? AGENT_COLORS[toId]?.name || toId : null;
  const entry = { fromId, fromColor, fromName, toId, toName, text, ts: getTimestamp() };
  logEntries.unshift(entry);
  if (logEntries.length > MAX_LOG) logEntries.pop();
  renderLog();
}
function renderLog() {
  activityLog.innerHTML = logEntries.map(e => `
    <div class="log-entry">
      <span class="log-ts">${e.ts}</span>
      <div class="log-agent-line">
        <span class="log-dot" style="background:${e.fromColor}"></span>
        <span class="log-from" style="color:${e.fromColor}">${e.fromName}</span>
        ${e.toName && e.toName !== e.fromName ? `<span class="log-arrow">→</span><span class="log-to">${e.toName}</span>` : ''}
      </div>
      <div class="log-text">"${escHtml(e.text)}"</div>
    </div>
  `).join('');
}

}

const agentTooltip = document.getElementById('agent-tooltip');
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = CANVAS_W / rect.width, scaleY = CANVAS_H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  let hit = null;
  for (const agent of agents) {
    const cxPx = gx(Math.round(agent.x));
    const avatarCY = gy(Math.round(agent.y)) - 11 * 2;
    if (mx >= cxPx - 14 && mx <= cxPx + 14 && my >= avatarCY - 14 && my <= avatarCY + 14) { hit = agent; break; }
  }
  if (hit) {
    const col = AGENT_COLORS[hit.id];
    agentTooltip.textContent = col ? `${col.name} — ${col.role}` : hit.id;
    agentTooltip.style.display = 'block';
    agentTooltip.style.left = (e.clientX + 14) + 'px';
    agentTooltip.style.top  = (e.clientY - 10) + 'px';
    canvas.style.cursor = 'pointer';
  } else {
    agentTooltip.style.display = 'none';
    canvas.style.cursor = 'default';
  }
});
canvas.addEventListener('mouseleave', () => { agentTooltip.style.display = 'none'; canvas.style.cursor = 'default'; });

// ============================================================
// GAME LOOP
// ============================================================
let lastFrameTime = 0;
function gameLoop(timestamp) {
  const elapsed = timestamp - lastFrameTime;
  if (elapsed >= FRAME_MS) {
    lastFrameTime = timestamp - (elapsed % FRAME_MS);
    tickAgents(); draw(); renderStatusPanel();
  }
  requestAnimationFrame(gameLoop);
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// TASK MANAGER
// ============================================================
let taskData = { backlog: [], active: [], completed: [] };
let tasksVisible = false;
function toggleTasks() {
  tasksVisible = !tasksVisible;
  document.getElementById('task-panel').classList.toggle('visible', tasksVisible);
  if (tasksVisible) loadTasks();
}
function taskLabel(filename) {
  let name = filename.replace(/^\d{4}-\d{2}-\d{2}-/, '').replace(/\.md$/, '').replace(/-/g, ' ');
  return name.charAt(0).toUpperCase() + name.slice(1);
}
const taskContentCache = {};
async function fetchTaskContent(filename) {
  if (taskContentCache[filename]) return taskContentCache[filename];
  try {
    const resp = await fetch(`/api/tasks/${encodeURIComponent(filename)}`);
    if (!resp.ok) return null;
    const text = await resp.text();
    taskContentCache[filename] = text; return text;
  } catch (e) { return null; }
}
function parseAgentFromContent(content) {
  if (!content) return null;
  const match = content.match(/^\*\*Agent:\*\*\s*(.+)$/m);
  return match ? match[1].trim() : null;
}
async function loadTasks() {
  const errEl = document.getElementById('task-error');
  errEl.textContent = '';
  try {
    const resp = await fetch('/api/tasks');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    taskData = await resp.json();
    await renderTaskManager();
  } catch (e) { errEl.textContent = 'Start server.py to enable task management.'; }
}
async function createTask(title, agent, description) {
  const resp = await fetch('/api/tasks', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, agent, description }),
  });
  if (!resp.ok) { const data = await resp.json().catch(() => ({})); throw new Error(data.error || `HTTP ${resp.status}`); }
  return resp.json();
}
async function assignTask(filename, agent) {
  const resp = await fetch('/api/tasks/assign', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ filename, agent }),
  });
  if (!resp.ok) { const data = await resp.json().catch(() => ({})); throw new Error(data.error || `HTTP ${resp.status}`); }
  delete taskContentCache[filename]; return resp.json();
}
async function doneTask(filename) {
  const resp = await fetch('/api/tasks/done', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ filename }),
  });
  if (!resp.ok) { const data = await resp.json().catch(() => ({})); throw new Error(data.error || `HTTP ${resp.status}`); }
  delete taskContentCache[filename]; return resp.json();
}
async function handleCreateTask() {
  const errEl = document.getElementById('task-form-error');
  errEl.textContent = '';
  const title = document.getElementById('tf-title').value.trim();
  if (!title) { errEl.textContent = 'Title is required.'; return; }
  try {
    await createTask(title, 'orchestrator', '');
    document.getElementById('tf-title').value = '';
    await loadTasks();
  } catch (e) { errEl.textContent = `Error: ${e.message}`; }
}
async function handleAssign(filename, selectEl) {
  try { await assignTask(filename, selectEl.value); await loadTasks(); }
  catch (e) { document.getElementById('task-error').textContent = `Assign failed: ${e.message}`; }
}
async function handleDone(filename) {
  try { await doneTask(filename); await loadTasks(); }
  catch (e) { document.getElementById('task-error').textContent = `Done failed: ${e.message}`; }
}
function agentDotHtml(agentId) {
  const color = AGENT_COLORS[agentId]?.primary || '#888';
  return `<span class="task-agent-dot" style="background:${color}"></span>`;
}
function agentSelectHtml(forAssign, filename) {
  const id = `assign-sel-${filename.replace(/\./g, '-')}`;
  const options = Object.entries(AGENT_COLORS).map(([k, v]) => `<option value="${k}">${v.name}</option>`).join('');
  return `<select class="task-select" id="${escHtml(id)}" style="font-size:11px;padding:3px 6px;">${options}</select>
    <button class="task-btn-assign" onclick="handleAssign('${escHtml(filename)}', document.getElementById('${escHtml(id)}'))">Assign</button>`;
}
async function renderTaskManager() {
  const allFiles = [...taskData.backlog.slice(0,30), ...taskData.active.slice(0,30), ...taskData.completed.slice(0,20)];
  await Promise.all(allFiles.map(f => fetchTaskContent(f)));
  function renderCard(filename, bucket) {
    const label = taskLabel(filename);
    const content = taskContentCache[filename];
    const agent = parseAgentFromContent(content) || 'orchestrator';
    const agentInfo = AGENT_COLORS[agent];
    const agentLabel = agentInfo ? agentInfo.name : agent;
    const agentColor = agentInfo ? agentInfo.primary : '#888';
    let actionsHtml = '';
    if (bucket === 'active') {
      actionsHtml = `<div class="task-card-actions">
        <button class="task-btn-done" onclick="handleDone('${escHtml(filename)}')">&#10003; Done</button>
        <button class="run-btn" onclick="runTask('${escHtml(filename)}', '${escHtml(agent)}')">&#9654; Run</button>
      </div>`;
    }
    return `<div class="task-card" title="${escHtml(filename)}">
      <div class="task-card-name">${escHtml(label)}</div>
      <div class="task-card-agent">${agentDotHtml(agent)}<span style="color:${agentColor}">${escHtml(agentLabel)}</span></div>
      ${actionsHtml}
    </div>`;
  }
  for (const bucket of ['backlog', 'active', 'completed']) {
    const el = document.getElementById(`task-col-${bucket}`);
    const files = taskData[bucket] || [];
    el.innerHTML = files.length === 0
      ? `<div class="task-col-empty">empty</div>`
      : [...files].reverse().map(f => renderCard(f, bucket)).join('');
  }
}

// ============================================================
// RUNNING AGENTS
// ============================================================
let runningAgents = new Set();
let terminalPollInterval = null;
function pollRunStatus() {
  setInterval(async () => {
    try {
      const r = await fetch('/api/run/status');
      if (!r.ok) return;
      const d = await r.json();
      runningAgents = new Set((d.running || []).map(fname => {
        const content = taskContentCache[fname];
        return parseAgentFromContent(content) || null;
      }).filter(Boolean));
    } catch (e) {}
  }, 3000);
}
async function runTask(filename, agent) {
  document.getElementById('terminal-panel').style.display = 'block';
  document.getElementById('terminal-output').innerHTML = '';
  document.getElementById('terminal-title').textContent = `${agent.charAt(0).toUpperCase() + agent.slice(1)} — ${taskLabel(filename)}`;
  document.getElementById('terminal-status').textContent = 'Starting...';
  document.getElementById('terminal-panel').scrollIntoView({ behavior: 'smooth' });
  try {
    const res = await fetch('/api/run', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename, agent }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed to start');
    runningAgents.add(agent);
    const runningCanvasAgent = agents.find(a => a.id === agent);
    if (runningCanvasAgent && DESKS[agent]) {
      const pos = deskStandPos(agent);
      startWalking(runningCanvasAgent, pos.x, pos.y, 'working');
      runningCanvasAgent.bubble = { text: 'On it...', timer: 80 };
    }
    let linesShown = 0;
    clearInterval(terminalPollInterval);
    terminalPollInterval = setInterval(async () => {
      const r = await fetch(`/api/run/output?task_id=${encodeURIComponent(filename)}`);
      const d = await r.json();
      const output = document.getElementById('terminal-output');
      const newLines = d.lines.slice(linesShown);
      newLines.forEach(line => {
        const div = document.createElement('div');
        div.textContent = line;
        if (line.startsWith('\u2713') || line.includes('completed') || line.includes('Done')) div.style.color = '#1a7a38';
        else if (line.startsWith('Error') || line.startsWith('\u2717')) div.style.color = 'var(--accent-red)';
        else if (line.startsWith('>') || line.startsWith('$')) div.style.color = 'var(--accent)';
        output.appendChild(div);
      });
      linesShown = d.lines.length;
      output.scrollTop = output.scrollHeight;
      if (d.done) {
        clearInterval(terminalPollInterval);
        document.getElementById('terminal-status').textContent = '\u2713 Done';
        document.getElementById('terminal-status').style.color = '#1a7a38';
        runningAgents.delete(agent);
        const doneCanvasAgent = agents.find(a => a.id === agent);
        if (doneCanvasAgent) { doneCanvasAgent.state = 'idle'; doneCanvasAgent.stateTimer = randi(20, 40); doneCanvasAgent.bubble = { text: 'Done!', timer: 100 }; }
        setTimeout(() => loadTasks().then(renderTaskManager), 1500);
      } else {
        document.getElementById('terminal-status').textContent = `Running... (${linesShown} lines)`;
      }
    }, 400);
  } catch (e) {
    document.getElementById('terminal-output').textContent = `Error: ${e.message}\n\nMake sure server.py is running.`;
    document.getElementById('terminal-status').textContent = 'Failed';
  }
}
function closeTerminal() {
  clearInterval(terminalPollInterval);
  document.getElementById('terminal-panel').style.display = 'none';
}
