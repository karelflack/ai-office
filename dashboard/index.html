<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Office</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #f0e0c0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
    }

    /* ---- HEADER ---- */
    #header {
      background: #1a0a00;
      border-bottom: 2px solid #3d2b1a;
      padding: 0 1rem;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #header h1 {
      font-family: 'Courier New', monospace;
      font-size: 20px;
      font-weight: bold;
      color: #f0e0c0;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    #live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e74c3c;
      animation: livePulse 1.2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
    #behind-btn {
      background: #3d2b1a;
      border: 1px solid #6b4520;
      color: #f0e0c0;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 6px 14px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s;
    }
    #behind-btn:hover { background: #6b4520; }

    #tasks-btn {
      background: #0a1a0a;
      border: 1px solid #1a4520;
      color: #a0d0a0;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 6px 14px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s;
    }
    #tasks-btn:hover { background: #1a3020; }

    /* ---- TASK MANAGER PANEL ---- */
    #task-panel {
      display: none;
      background: #0a0a0a;
      border-top: 1px solid #333;
      padding: 1.5rem 2rem;
    }
    #task-panel.visible { display: block; }

    #task-panel h2 {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #6a9a6a;
      margin-bottom: 1rem;
      border-bottom: 1px solid #1a3a1a;
      padding-bottom: 0.5rem;
    }

    /* New task form */
    #task-form {
      background: #111;
      border: 1px solid #222;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }
    #task-form-title {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #6a9a6a;
      margin-bottom: 0.75rem;
    }
    .task-form-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }
    .task-form-label {
      font-size: 10px;
      color: #666;
      width: 42px;
      flex-shrink: 0;
    }
    .task-input {
      background: #0a0a0a;
      border: 1px solid #333;
      color: #d0d0d0;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 4px 8px;
      flex: 1;
      min-width: 160px;
    }
    .task-input:focus { outline: none; border-color: #2a5a2a; }
    .task-select {
      background: #0a0a0a;
      border: 1px solid #333;
      color: #d0d0d0;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 4px 8px;
    }
    .task-select:focus { outline: none; border-color: #2a5a2a; }
    .task-btn {
      background: #1a2a1a;
      border: 1px solid #2a5a2a;
      color: #a0d0a0;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 4px 12px;
      cursor: pointer;
      letter-spacing: 1px;
      white-space: nowrap;
    }
    .task-btn:hover { background: #2a3a2a; }
    .task-btn-done {
      background: #1a1a2a;
      border: 1px solid #2a2a5a;
      color: #a0a0d0;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      padding: 3px 8px;
      cursor: pointer;
    }
    .task-btn-done:hover { background: #2a2a3a; }
    .task-btn-assign {
      background: #1a2a1a;
      border: 1px solid #2a5a2a;
      color: #a0d0a0;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      padding: 3px 8px;
      cursor: pointer;
    }
    .task-btn-assign:hover { background: #2a3a2a; }
    .run-btn {
      background: #1a3a1a;
      border: 1px solid #2ecc71;
      color: #2ecc71;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      padding: 3px 8px;
      cursor: pointer;
    }
    .run-btn:hover { background: #2a4a2a; }

    /* Terminal panel */
    #terminal-panel {
      margin-top: 1rem;
      background: #000;
      border: 1px solid #2ecc71;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
    }
    #terminal-header {
      display: flex;
      justify-content: space-between;
      padding: 0.4rem 0.75rem;
      border-bottom: 1px solid #1a3a1a;
      color: #2ecc71;
    }
    #terminal-output {
      height: 220px;
      overflow-y: auto;
      padding: 0.75rem;
      color: #a0a0a0;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #terminal-status {
      padding: 0.4rem 0.75rem;
      border-top: 1px solid #1a3a1a;
      color: #555;
      font-size: 0.75rem;
    }

    /* Task columns */
    #task-columns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }
    .task-col-header {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #6a9a6a;
      margin-bottom: 0.5rem;
      padding-bottom: 4px;
      border-bottom: 1px solid #1a3a1a;
    }
    .task-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.5rem;
      font-size: 11px;
    }
    .task-card:hover { background: #2a2a2a; }
    .task-card-name {
      color: #c0c0c0;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .task-card-agent {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 9px;
      color: #666;
      margin-bottom: 6px;
    }
    .task-agent-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .task-card-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .task-col-empty {
      font-size: 10px;
      color: #333;
      font-style: italic;
    }
    #task-error {
      font-size: 11px;
      color: #e74c3c;
      margin-top: 0.5rem;
    }
    #task-form-error {
      font-size: 10px;
      color: #e74c3c;
      margin-top: 4px;
    }

    /* ---- MAIN AREA ---- */
    #main {
      display: flex;
      flex-direction: row;
      overflow-x: auto;
    }

    /* ---- CANVAS WRAPPER ---- */
    #canvas-wrap {
      position: relative;
      flex-shrink: 0;
    }
    #game-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    /* CRT scanline overlay */
    #scanlines {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.18) 2px,
        rgba(0,0,0,0.18) 4px
      );
      z-index: 10;
    }

    /* ---- SIDEBAR ---- */
    #sidebar {
      width: 260px;
      flex-shrink: 0;
      background: #111111;
      border-left: 1px solid #333;
      display: flex;
      flex-direction: column;
      height: 480px;
      overflow: hidden;
    }
    #sidebar-header {
      background: #1a0a00;
      border-bottom: 1px solid #333;
      padding: 6px 10px;
      font-size: 10px;
      color: #a08060;
      letter-spacing: 2px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    #activity-log {
      flex: 1;
      overflow-y: auto;
      padding: 6px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #activity-log::-webkit-scrollbar { width: 4px; }
    #activity-log::-webkit-scrollbar-track { background: #111; }
    #activity-log::-webkit-scrollbar-thumb { background: #3d2b1a; }

    .log-entry {
      font-size: 10px;
      line-height: 1.5;
      border-bottom: 1px solid #1a1a1a;
      padding-bottom: 4px;
    }
    .log-ts {
      color: #555;
      font-size: 9px;
    }
    .log-agent-line {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 1px;
    }
    .log-dot {
      width: 7px;
      height: 7px;
      border-radius: 1px;
      flex-shrink: 0;
    }
    .log-from { font-weight: bold; }
    .log-arrow { color: #555; }
    .log-to { color: #a08060; }
    .log-text {
      color: #88c0a0;
      font-style: italic;
      font-size: 9px;
      padding-left: 12px;
    }

    #agent-status-panel {
      border-top: 1px solid #333;
      padding: 6px 8px;
      flex-shrink: 0;
    }
    #agent-status-panel h3 {
      font-size: 9px;
      color: #a08060;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .status-agent-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      padding: 2px 0;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-agent-name { flex: 1; color: #d0c0a0; }
    .status-state {
      font-size: 9px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .status-state.working { color: #2ecc71; }
    .status-state.talking { color: #e67e22; }
    .status-state.walking { color: #3498db; }
    .status-state.idle { color: #555; }

    /* ---- BEHIND THE SCENES TOGGLE ---- */
    #toggle-bar {
      background: #1a0a00;
      border-top: 1px solid #3d2b1a;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      width: 100%;
      border: none;
      color: #a08060;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 1px;
      text-align: left;
    }
    #toggle-bar:hover { background: #2a1500; }
    #toggle-arrow { transition: transform 0.2s; font-size: 10px; }
    #toggle-arrow.open { transform: rotate(180deg); }

    /* ---- TECHNICAL PANEL ---- */
    #tech-panel {
      display: none;
      background: #0a0a0a;
      border-top: 1px solid #333;
      padding: 1.5rem 2rem;
    }
    #tech-panel.visible { display: block; }
    #tech-panel h2 {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #a08060;
      margin-bottom: 1rem;
      border-bottom: 1px solid #333;
      padding-bottom: 0.5rem;
    }
    .tech-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .tech-card {
      background: #111;
      border: 1px solid #333;
      padding: 1rem;
    }
    .tech-card h3 {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #a08060;
      margin-bottom: 0.75rem;
    }
    .tech-badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border: 1px solid #2ecc71;
      color: #2ecc71;
      margin-bottom: 6px;
    }
    .tech-phase { font-size: 14px; font-weight: bold; color: #f0e0c0; margin-bottom: 4px; }
    .tech-summary { font-size: 11px; color: #888; line-height: 1.5; }
    .tech-date { font-size: 9px; color: #555; margin-top: 6px; }
    .tech-tag {
      display: inline-block;
      font-size: 9px;
      padding: 2px 6px;
      border: 1px solid #3d2b1a;
      color: #c0a080;
      margin: 2px 2px 2px 0;
    }
    .tech-update-list { list-style: none; }
    .tech-update-list li {
      padding: 4px 0;
      border-bottom: 1px solid #1a1a1a;
      font-size: 11px;
      display: flex;
      gap: 0.75rem;
    }
    .tech-update-list li:last-child { border-bottom: none; }
    .tech-date-col { color: #555; font-size: 9px; white-space: nowrap; padding-top: 2px; }
    .tech-note-col { color: #aaa; }
    .tech-agent-row {
      display: flex;
      gap: 0.75rem;
      padding: 5px 0;
      border-bottom: 1px solid #1a1a1a;
      font-size: 11px;
    }
    .tech-agent-row:last-child { border-bottom: none; }
    .tech-agent-name { font-weight: bold; min-width: 100px; color: #d0c0a0; text-transform: capitalize; }
    .tech-agent-note { color: #777; }
    #tech-load-btn {
      background: #3d2b1a;
      border: 1px solid #6b4520;
      color: #f0e0c0;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
      letter-spacing: 1px;
      margin-top: 0.5rem;
    }
    #tech-load-btn:hover { background: #6b4520; }
    #tech-error { color: #e74c3c; font-size: 11px; margin-top: 6px; }
    #tech-dashboard { display: none; }
    #tech-dashboard.visible { display: block; }
  </style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="header-left">
    <div id="live-dot"></div>
    <h1>AI Office</h1>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <button id="tasks-btn" onclick="toggleTasks()">&#9632; Task Manager</button>
    <button id="behind-btn" onclick="toggleTech()">&#9881; Behind the Scenes</button>
  </div>
</div>

<!-- MAIN: canvas + sidebar -->
<div id="main">
  <div id="canvas-wrap">
    <canvas id="game-canvas" width="768" height="480"></canvas>
    <div id="scanlines"></div>
  </div>
  <div id="sidebar">
    <div id="sidebar-header">Activity Log</div>
    <div id="activity-log"></div>
    <div id="agent-status-panel">
      <h3>Agent Status</h3>
      <div id="status-rows"></div>
    </div>
  </div>
</div>

<!-- TOGGLE BAR -->
<button id="toggle-bar" onclick="toggleTech()">
  <span id="toggle-arrow">&#9660;</span>
  <span>BEHIND THE SCENES &mdash; TECHNICAL DASHBOARD</span>
</button>

<!-- TASK MANAGER PANEL -->
<div id="task-panel">
  <h2>Task Manager</h2>

  <!-- New Task Form -->
  <div id="task-form">
    <div id="task-form-title">New Task</div>
    <div class="task-form-row">
      <span class="task-form-label">Title:</span>
      <input id="tf-title" class="task-input" type="text" placeholder="Task title..." />
    </div>
    <div class="task-form-row">
      <span class="task-form-label">Agent:</span>
      <select id="tf-agent" class="task-select">
        <option value="orchestrator">Orchestrator</option>
        <option value="developer">Developer</option>
        <option value="researcher">Researcher</option>
        <option value="planner">Planner</option>
        <option value="reviewer">Reviewer</option>
        <option value="writer">Writer</option>
        <option value="generalist">Generalist</option>
      </select>
      <button class="task-btn" onclick="handleCreateTask()">+ Create Task</button>
    </div>
    <div class="task-form-row">
      <span class="task-form-label">Desc:</span>
      <input id="tf-desc" class="task-input" type="text" placeholder="Description (optional)" />
    </div>
    <div id="task-form-error"></div>
  </div>

  <!-- Task Columns -->
  <div id="task-error"></div>
  <div id="task-columns">
    <div>
      <div class="task-col-header">Backlog</div>
      <div id="task-col-backlog"></div>
    </div>
    <div>
      <div class="task-col-header">Active</div>
      <div id="task-col-active"></div>
    </div>
    <div>
      <div class="task-col-header">Completed</div>
      <div id="task-col-completed"></div>
    </div>
  </div>

  <!-- Live agent output terminal -->
  <div id="terminal-panel" style="display:none;">
    <div id="terminal-header">
      <span id="terminal-title">&#9679; AGENT OUTPUT</span>
      <button onclick="closeTerminal()" style="background:none;border:none;color:#2ecc71;cursor:pointer;font-size:1rem;">&#10005;</button>
    </div>
    <div id="terminal-output"></div>
    <div id="terminal-status"></div>
  </div>
</div>

<!-- TECHNICAL PANEL -->
<div id="tech-panel">
  <h2>Technical Dashboard</h2>
  <div style="margin-bottom:1rem;">
    <button id="tech-load-btn" onclick="loadMemory()">Load team_memory.json</button>
    <div id="tech-error"></div>
  </div>
  <div id="tech-dashboard">
    <div class="tech-grid">
      <div class="tech-card">
        <h3>Project Status</h3>
        <div class="tech-badge" id="t-badge">—</div>
        <div class="tech-phase" id="t-phase">—</div>
        <div class="tech-summary" id="t-summary">—</div>
        <div class="tech-date">Last updated: <span id="t-date">—</span></div>
      </div>
      <div class="tech-card">
        <h3>Active Decisions</h3>
        <div id="t-decisions">—</div>
      </div>
      <div class="tech-card">
        <h3>Recent Updates</h3>
        <ul class="tech-update-list" id="t-updates"></ul>
      </div>
      <div class="tech-card">
        <h3>Agent Notes</h3>
        <div id="t-agent-notes"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONSTANTS
// ============================================================
const CANVAS_W = 768;
const CANVAS_H = 480;
const PIXEL = 3;       // canvas px per game px
const TILE = 16;       // game px per tile
const GRID_W = 16;     // tiles wide
const GRID_H = 10;     // tiles tall
const FPS = 30;
const FRAME_MS = 1000 / FPS;

const AGENT_COLORS = {
  orchestrator: { primary: '#9b59b6', name: 'Orchestrator' },
  developer:    { primary: '#3498db', name: 'Developer' },
  researcher:   { primary: '#2ecc71', name: 'Researcher' },
  planner:      { primary: '#e67e22', name: 'Planner' },
  reviewer:     { primary: '#e74c3c', name: 'Reviewer' },
  writer:       { primary: '#1abc9c', name: 'Writer' },
  generalist:   { primary: '#f1c40f', name: 'Generalist' },
};

const DESKS = {
  orchestrator: { tx: 2,  ty: 1 },
  developer:    { tx: 12, ty: 1 },
  generalist:   { tx: 7,  ty: 1 },
  reviewer:     { tx: 2,  ty: 5 },
  writer:       { tx: 12, ty: 5 },
  researcher:   { tx: 2,  ty: 8 },
  planner:      { tx: 12, ty: 8 },
};

const MESSAGES = [
  { from: 'orchestrator', to: 'developer',    text: 'New task in active queue.' },
  { from: 'orchestrator', to: 'researcher',   text: 'Need research on this topic.' },
  { from: 'orchestrator', to: 'planner',      text: 'Break down the next milestone.' },
  { from: 'developer',    to: 'reviewer',     text: 'PR ready for review.' },
  { from: 'reviewer',     to: 'developer',    text: 'LGTM. Merging.' },
  { from: 'reviewer',     to: 'developer',    text: 'Needs revision on auth logic.' },
  { from: 'researcher',   to: 'writer',       text: 'Findings ready. Check notes.' },
  { from: 'writer',       to: 'orchestrator', text: 'README updated.' },
  { from: 'planner',      to: 'orchestrator', text: 'Roadmap updated. 3 tasks queued.' },
  { from: 'generalist',   to: 'orchestrator', text: 'On it. Adapting to task.' },
  { from: 'developer',    to: 'generalist',   text: 'Can you handle the config?' },
  { from: 'researcher',   to: 'planner',      text: 'Found a dependency we missed.' },
  { from: 'planner',      to: 'developer',    text: 'Task spec is in active/.' },
  { from: 'writer',       to: 'reviewer',     text: 'Docs draft ready for review.' },
  { from: 'orchestrator', to: 'generalist',   text: 'No owner for this task — take it.' },
  { from: 'developer',    to: 'developer',    text: 'Running tests...' },
  { from: 'researcher',   to: 'researcher',   text: 'Searching docs...' },
  { from: 'writer',       to: 'writer',       text: 'Drafting...' },
];

// ============================================================
// COLORS & HELPERS
// ============================================================

// Parse hex color into r,g,b
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return { r, g, b };
}

// Darken a hex color by factor (0..1)
function darken(hex, factor) {
  const { r, g, b } = hexToRgb(hex);
  const d = 1 - factor;
  return `rgb(${Math.floor(r*d)},${Math.floor(g*d)},${Math.floor(b*d)})`;
}

// Convert game pixel coordinates to canvas coordinates
function gx(x) { return Math.floor(x) * PIXEL; }
function gy(y) { return Math.floor(y) * PIXEL; }

// Tile top-left in game pixels
function tileX(tx) { return tx * TILE; }
function tileY(ty) { return ty * TILE; }

// Random int [min, max) inclusive
function randi(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function randf(min, max) { return Math.random() * (max - min) + min; }
function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ============================================================
// AGENT INITIALIZATION
// ============================================================

function makeAgents() {
  return Object.keys(AGENT_COLORS).map(id => {
    // Start each agent near their desk
    const desk = DESKS[id];
    const startX = tileX(desk.tx) + TILE / 2;
    // Clamp standing position so agents don't overlap the bottom wall (row 9 = y 144)
    const rawY = tileY(desk.ty) + TILE + 4;
    const startY = Math.min(rawY, tileY(8) + TILE - 6);
    return {
      id,
      x: startX,
      y: startY,
      targetX: startX,
      targetY: startY,
      state: 'idle',
      stateTimer: randi(30, 90),    // ticks before first action
      bubble: null,
      walkFrame: 0,
      walkTick: 0,
      facing: 'down',
      // For "working" cursor blink
      cursorTick: 0,
      cursorVisible: false,
      // Next state after arriving
      pendingState: null,
      pendingMsg: null,
      pendingTarget: null,  // agent id we're walking to
    };
  });
}

let agents = makeAgents();

// ============================================================
// GAME LOGIC: STATE MACHINE
// ============================================================

// Convert agent standing position (logical px) — agent stands just below their desk.
// Clamped so agents at ty:8 don't bleed into the bottom wall.
function deskStandPos(agentId) {
  const desk = DESKS[agentId];
  const rawY = tileY(desk.ty) + TILE + TILE / 2;
  return {
    x: tileX(desk.tx) + TILE / 2,
    y: Math.min(rawY, tileY(8) + TILE - 6),
  };
}

function meetingTableCenter() {
  // Table occupies tiles (6,3)-(9,5)
  // Center is around (7.5, 4) in tile coords
  return { x: tileX(7) + TILE, y: tileY(4) };
}

// Safe random floor tile position (logical px)
function randomFloorPos() {
  // Floor: rows 1-8, cols 1-14, avoiding the meeting table block
  let tx, ty;
  do {
    tx = randi(1, 14);
    ty = randi(1, 8);
  } while (
    // avoid meeting table tiles 6-9, rows 3-5
    (tx >= 6 && tx <= 9 && ty >= 3 && ty <= 5) ||
    // avoid desk tiles
    Object.values(DESKS).some(d => d.tx === tx && d.ty === ty)
  );
  return {
    x: tileX(tx) + TILE / 2,
    y: tileY(ty) + TILE / 2,
  };
}

function dist(ax, ay, bx, by) {
  const dx = ax - bx, dy = ay - by;
  return Math.sqrt(dx*dx + dy*dy);
}

// Tick all agents' state machines
function tickAgents() {
  for (const agent of agents) {
    // Move toward target
    if (agent.state === 'walking') {
      const dx = agent.targetX - agent.x;
      const dy = agent.targetY - agent.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      const speed = 0.7; // game pixels per tick

      if (d < speed + 0.1) {
        // Arrived
        agent.x = agent.targetX;
        agent.y = agent.targetY;
        agent.walkFrame = 0;
        agent.walkTick = 0;

        if (agent.pendingState === 'working') {
          agent.state = 'working';
          agent.stateTimer = randi(90, 180); // 3-6 sec at 30fps
          // Self-talk bubble
          const selfMsg = MESSAGES.find(m => m.from === agent.id && m.to === agent.id);
          if (selfMsg) {
            agent.bubble = { text: selfMsg.text, timer: 90 };
            addLog(agent.id, null, selfMsg.text);
          }
        } else if (agent.pendingState === 'talking') {
          agent.state = 'talking';
          agent.stateTimer = randi(60, 120);
          // Find the target agent and trigger conversation
          const targetAgent = agents.find(a => a.id === agent.pendingTarget);
          if (targetAgent && agent.pendingMsg) {
            agent.bubble = { text: agent.pendingMsg.text, timer: 100 };
            if (targetAgent) {
              // Give target a short reply bubble
              const replyOptions = MESSAGES.filter(m => m.from === targetAgent.id && m.to !== targetAgent.id);
              if (replyOptions.length > 0) {
                const reply = pickRandom(replyOptions);
                setTimeout(() => {
                  if (targetAgent.bubble === null) {
                    targetAgent.bubble = { text: reply.text, timer: 80 };
                  }
                }, 1200);
              }
            }
            addLog(agent.id, agent.pendingTarget, agent.pendingMsg.text);
          }
          agent.pendingTarget = null;
          agent.pendingMsg = null;
        } else if (agent.pendingState === 'meeting') {
          agent.state = 'talking';
          agent.stateTimer = randi(90, 150);
          const mtg = MESSAGES.filter(m => m.from === agent.id);
          if (mtg.length > 0) {
            const m = pickRandom(mtg);
            agent.bubble = { text: m.text, timer: 90 };
          }
        } else {
          agent.state = 'idle';
          agent.stateTimer = randi(30, 90);
        }
        agent.pendingState = null;
      } else {
        // Still walking
        agent.x += (dx / d) * speed;
        agent.y += (dy / d) * speed;

        // Update facing direction
        if (Math.abs(dx) > Math.abs(dy)) {
          agent.facing = dx > 0 ? 'right' : 'left';
        } else {
          agent.facing = dy > 0 ? 'down' : 'up';
        }

        // Walk animation
        agent.walkTick++;
        if (agent.walkTick >= 12) {
          agent.walkTick = 0;
          agent.walkFrame = agent.walkFrame === 0 ? 1 : 0;
        }
      }
    } else {
      // Not walking — count down state timer
      agent.stateTimer--;
      if (agent.stateTimer <= 0) {
        if (agent.state === 'working' || agent.state === 'talking') {
          agent.state = 'idle';
          agent.bubble = null;
          agent.stateTimer = randi(20, 60);
        } else if (agent.state === 'idle') {
          decideNextAction(agent);
        }
      }

      // Cursor blink for working agents
      if (agent.state === 'working') {
        agent.cursorTick++;
        if (agent.cursorTick >= 18) {
          agent.cursorTick = 0;
          agent.cursorVisible = !agent.cursorVisible;
        }
      } else {
        agent.cursorVisible = false;
        agent.cursorTick = 0;
      }
    }

    // Decrement bubble timer
    if (agent.bubble) {
      agent.bubble.timer--;
      if (agent.bubble.timer <= 0) {
        agent.bubble = null;
      }
    }
  }
}

function decideNextAction(agent) {
  const roll = Math.random();

  if (roll < 0.40) {
    // Walk to own desk and work
    const pos = deskStandPos(agent.id);
    startWalking(agent, pos.x, pos.y, 'working');
  } else if (roll < 0.75) {
    // Walk to another agent's desk and talk
    const otherIds = Object.keys(DESKS).filter(id => id !== agent.id);
    const targetId = pickRandom(otherIds);
    const pos = deskStandPos(targetId);
    // Stand to the side of the target
    const offsetX = randi(-6, 6);
    const msgs = MESSAGES.filter(m => m.from === agent.id && m.to !== agent.id);
    if (msgs.length === 0) {
      startWalking(agent, pos.x + offsetX, pos.y, 'idle');
      return;
    }
    const msg = pickRandom(msgs);
    agent.pendingTarget = targetId;
    agent.pendingMsg = msg;
    startWalking(agent, pos.x + offsetX, pos.y - 4, 'talking');
  } else if (roll < 0.90) {
    // Walk to meeting table
    const mtg = meetingTableCenter();
    const offsetX = randi(-TILE, TILE);
    const offsetY = randi(-4, 4);
    startWalking(agent, mtg.x + offsetX, mtg.y + offsetY, 'meeting');
  } else {
    // Walk to random floor tile
    const pos = randomFloorPos();
    startWalking(agent, pos.x, pos.y, 'idle');
  }
}

function startWalking(agent, tx, ty, nextState) {
  // Clamp to floor bounds (game pixels)
  const minX = tileX(1) + 4;
  const maxX = tileX(14) + TILE - 4;
  const minY = tileY(1) + 4;
  const maxY = tileY(8) + TILE - 4;
  agent.targetX = Math.max(minX, Math.min(maxX, tx));
  agent.targetY = Math.max(minY, Math.min(maxY, ty));
  agent.state = 'walking';
  agent.pendingState = nextState;
  agent.bubble = null;
}

// ============================================================
// DRAWING
// ============================================================

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// Floor tile colors
const FLOOR_A = '#c8a97a';
const FLOOR_B = '#b8956a';
const WALL_COLOR = '#3d2b1a';
const DESK_SURFACE = '#8b6343';
const DESK_FRONT = '#6b4520';
const TABLE_COLOR = '#5a3a1a';
const TABLE_HIGHLIGHT = '#6b4520';
const PLANT_GREEN = '#2d6a4f';
const PLANT_DARK = '#1b4332';
const PLANT_POT = '#8b4513';
const SKIN = '#ffd5a8';
const LEGS = '#2c2c2c';
const SHOES = '#111111';

function drawRect(gxPos, gyPos, gw, gh, color) {
  ctx.fillStyle = color;
  ctx.fillRect(gx(gxPos), gy(gyPos), gw * PIXEL, gh * PIXEL);
}

function drawFloor() {
  for (let ty = 1; ty <= 8; ty++) {
    for (let tx = 1; tx <= 14; tx++) {
      const color = (tx + ty) % 2 === 0 ? FLOOR_A : FLOOR_B;
      drawRect(tileX(tx), tileY(ty), TILE, TILE, color);
    }
  }
}

function drawWalls() {
  // Top wall
  for (let tx = 0; tx < GRID_W; tx++) {
    drawRect(tileX(tx), tileY(0), TILE, TILE, WALL_COLOR);
    // Baseboard stripe
    ctx.fillStyle = '#2a1a0a';
    ctx.fillRect(gx(tileX(tx)), gy(tileY(0) + TILE - 2), TILE * PIXEL, 2 * PIXEL);
  }
  // Bottom wall
  for (let tx = 0; tx < GRID_W; tx++) {
    drawRect(tileX(tx), tileY(9), TILE, TILE, WALL_COLOR);
  }
  // Left wall
  for (let ty = 0; ty < GRID_H; ty++) {
    drawRect(tileX(0), tileY(ty), TILE, TILE, WALL_COLOR);
  }
  // Right wall
  for (let ty = 0; ty < GRID_H; ty++) {
    drawRect(tileX(15), tileY(ty), TILE, TILE, WALL_COLOR);
  }
}

// Draw a small window on top wall
function drawWallDetails() {
  // Windows on top wall
  const windowPositions = [4, 8, 12];
  for (const wx of windowPositions) {
    // Window frame
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(gx(tileX(wx) + 2), gy(tileY(0) + 2), 12 * PIXEL, 12 * PIXEL);
    // Glass
    ctx.fillStyle = '#a0c0e0';
    ctx.fillRect(gx(tileX(wx) + 3), gy(tileY(0) + 3), 10 * PIXEL, 10 * PIXEL);
    // Reflection
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillRect(gx(tileX(wx) + 3), gy(tileY(0) + 3), 4 * PIXEL, 3 * PIXEL);
    // Cross bar
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(gx(tileX(wx) + 3), gy(tileY(0) + 8), 10 * PIXEL, PIXEL);
    ctx.fillRect(gx(tileX(wx) + 8), gy(tileY(0) + 3), PIXEL, 10 * PIXEL);
  }
}

function drawDesk(tx, ty, agentId) {
  // Desk top surface (2 tiles wide, 1 tile deep)
  drawRect(tileX(tx) - 1, tileY(ty) + 2, TILE + 2, TILE - 4, DESK_SURFACE);
  // Desk front face
  drawRect(tileX(tx) - 1, tileY(ty) + TILE - 4, TILE + 2, 4, DESK_FRONT);
  // Monitor
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(gx(tileX(tx) + 3), gy(tileY(ty) + 3), 8 * PIXEL, 6 * PIXEL);
  // Monitor screen glow (agent color)
  const col = AGENT_COLORS[agentId];
  if (col) {
    const { r, g, b } = hexToRgb(col.primary);
    ctx.fillStyle = `rgba(${r},${g},${b},0.6)`;
    ctx.fillRect(gx(tileX(tx) + 4), gy(tileY(ty) + 4), 6 * PIXEL, 4 * PIXEL);
  }
  // Monitor stand
  ctx.fillStyle = '#333';
  ctx.fillRect(gx(tileX(tx) + 6), gy(tileY(ty) + 9), 2 * PIXEL, 2 * PIXEL);
  // Keyboard
  ctx.fillStyle = '#888';
  ctx.fillRect(gx(tileX(tx) + 4), gy(tileY(ty) + 11), 6 * PIXEL, 2 * PIXEL);
}

function drawMeetingTable() {
  // Meeting table: tiles (6,3) to (9,5) — 4×3 block
  // Table surface
  drawRect(tileX(6) + 2, tileY(3) + 2, TILE * 4 - 4, TILE * 3 - 4, TABLE_COLOR);
  // Table edge highlight
  ctx.strokeStyle = TABLE_HIGHLIGHT;
  ctx.lineWidth = PIXEL;
  ctx.strokeRect(
    gx(tileX(6) + 2) + PIXEL * 0.5,
    gy(tileY(3) + 2) + PIXEL * 0.5,
    (TILE * 4 - 4) * PIXEL - PIXEL,
    (TILE * 3 - 4) * PIXEL - PIXEL
  );
  // Chair positions around the table (simple squares)
  const chairColor = '#4a2a10';
  const chairPositions = [
    // Top row chairs
    { x: tileX(6) + 4,  y: tileY(3) - 3 }, { x: tileX(7) + 4,  y: tileY(3) - 3 },
    { x: tileX(8) + 4,  y: tileY(3) - 3 }, { x: tileX(9) + 4,  y: tileY(3) - 3 },
    // Bottom row chairs
    { x: tileX(6) + 4,  y: tileY(5) + TILE }, { x: tileX(7) + 4,  y: tileY(5) + TILE },
    { x: tileX(8) + 4,  y: tileY(5) + TILE }, { x: tileX(9) + 4,  y: tileY(5) + TILE },
  ];
  for (const c of chairPositions) {
    drawRect(c.x, c.y, 8, 4, chairColor);
    drawRect(c.x + 1, c.y + 1, 6, 2, '#5a3a1a');
  }
}

function drawPlant(tx, ty) {
  // Pot
  drawRect(tileX(tx) + 4, tileY(ty) + 8, 8, 6, PLANT_POT);
  drawRect(tileX(tx) + 5, tileY(ty) + 9, 6, 4, '#a0522d');
  // Leaves cluster
  drawRect(tileX(tx) + 5, tileY(ty) + 3, 6, 6, PLANT_GREEN);
  drawRect(tileX(tx) + 4, tileY(ty) + 4, 8, 4, PLANT_GREEN);
  drawRect(tileX(tx) + 6, tileY(ty) + 1, 4, 4, PLANT_GREEN);
  // Dark leaf accents
  drawRect(tileX(tx) + 6, tileY(ty) + 2, 2, 2, PLANT_DARK);
  drawRect(tileX(tx) + 9, tileY(ty) + 5, 2, 2, PLANT_DARK);
}

function drawFurniture() {
  // Desks
  for (const [agentId, desk] of Object.entries(DESKS)) {
    drawDesk(desk.tx, desk.ty, agentId);
  }
  // Meeting table
  drawMeetingTable();
  // Plants in corners
  drawPlant(1, 1);
  drawPlant(14, 1);
  drawPlant(1, 8);
  drawPlant(14, 8);
}

// Draw a single agent sprite centered at (cx, cy) in game pixels
function drawAgentSprite(cx, cy, agentId, walkFrame) {
  const col = AGENT_COLORS[agentId];
  if (!col) return;
  const primary = col.primary;
  const bodyColor = darken(primary, 0.2);

  // Pulsing green glow when this agent has an active claude run
  if (runningAgents.has(agentId)) {
    ctx.save();
    ctx.globalAlpha = 0.3 + 0.2 * Math.sin(Date.now() / 300);
    ctx.fillStyle = '#2ecc71';
    ctx.beginPath();
    ctx.arc(gx(cx), gy(cy), 20, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Shadow beneath agent
  const shadowAlpha = 0.35;
  ctx.fillStyle = `rgba(0,0,0,${shadowAlpha})`;
  ctx.beginPath();
  ctx.ellipse(
    gx(cx), gy(cy + 6),
    5 * PIXEL, 2 * PIXEL,
    0, 0, Math.PI * 2
  );
  ctx.fill();

  // Sprite: 8 wide, 12 tall — draw centered so cx,cy is feet
  const sx = cx - 4; // top-left x of sprite in game pixels
  const sy = cy - 12;

  // Walking leg offset
  const legOff = walkFrame === 1 ? 1 : 0;

  // Row 0: hair
  drawRect(sx + 2, sy + 0, 4, 1, primary);

  // Rows 1-3: head with hair on sides
  drawRect(sx + 1, sy + 1, 1, 3, primary); // left hair
  drawRect(sx + 6, sy + 1, 1, 3, primary); // right hair
  drawRect(sx + 2, sy + 1, 4, 3, SKIN);    // face

  // Rows 4-7: body
  drawRect(sx + 2, sy + 4, 4, 1, primary);  // shoulder row
  drawRect(sx + 1, sy + 5, 6, 3, bodyColor); // torso

  // Rows 8-9: legs
  if (walkFrame === 0) {
    drawRect(sx + 2, sy + 8, 1, 2, LEGS);
    drawRect(sx + 5, sy + 8, 1, 2, LEGS);
  } else {
    // Legs spread apart slightly
    drawRect(sx + 1, sy + 8, 1, 2, LEGS);
    drawRect(sx + 6, sy + 8, 1, 2, LEGS);
  }

  // Row 10: shoes
  if (walkFrame === 0) {
    drawRect(sx + 2, sy + 10, 1, 1, SHOES);
    drawRect(sx + 5, sy + 10, 1, 1, SHOES);
  } else {
    drawRect(sx + 1, sy + 10, 1, 1, SHOES);
    drawRect(sx + 6, sy + 10, 1, 1, SHOES);
  }
}

// Draw a speech bubble with text above the agent.
// cx, cy are in game pixels (agent center/feet position).
// All canvas drawing is done in canvas pixels.
function drawBubble(cx, cy, text) {
  const maxChars = 20;

  // Word-wrap
  const words = text.split(' ');
  const lines = [];
  let current = '';
  for (const word of words) {
    const candidate = current ? current + ' ' + word : word;
    if (candidate.length > maxChars) {
      if (current) lines.push(current);
      current = word;
    } else {
      current = candidate;
    }
  }
  if (current) lines.push(current);

  // All sizing in canvas pixels
  const FONT_SIZE = 10;
  ctx.font = `bold ${FONT_SIZE}px 'Courier New', monospace`;
  ctx.textBaseline = 'top';

  // Measure max line width
  let maxW = 0;
  for (const line of lines) {
    const w = ctx.measureText(line).width;
    if (w > maxW) maxW = w;
  }

  const PAD_X = 6;   // canvas px padding x
  const PAD_Y = 4;   // canvas px padding y
  const LINE_H = FONT_SIZE + 2;
  const bw = maxW + PAD_X * 2;  // bubble width in canvas px
  const bh = lines.length * LINE_H + PAD_Y * 2;

  // Agent head top is at cy - 12 game px = (cy - 12) * PIXEL canvas px
  // Place bubble bottom 4 canvas px above the head
  const bubbleBottomY = gy(cy - 12) - 4;
  const bubbleTopY = bubbleBottomY - bh;
  // Center bubble horizontally over agent
  const bubbleLeftX = gx(cx) - Math.floor(bw / 2);

  // Clamp to canvas bounds
  const clampedX = Math.max(2, Math.min(CANVAS_W - bw - 2, bubbleLeftX));
  const clampedY = Math.max(2, bubbleTopY);

  // Background
  ctx.fillStyle = '#f5f0e8';
  ctx.fillRect(clampedX, clampedY, bw, bh);

  // Border
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  ctx.strokeRect(clampedX + 0.5, clampedY + 0.5, bw - 1, bh - 1);

  // Tail triangle pointing down toward agent head
  const tailCX = gx(cx);
  ctx.fillStyle = '#f5f0e8';
  ctx.beginPath();
  ctx.moveTo(Math.max(clampedX + 4, tailCX - 5), bubbleBottomY);
  ctx.lineTo(Math.min(clampedX + bw - 4, tailCX + 5), bubbleBottomY);
  ctx.lineTo(tailCX, bubbleBottomY + 5);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(Math.max(clampedX + 4, tailCX - 5), bubbleBottomY);
  ctx.lineTo(tailCX, bubbleBottomY + 5);
  ctx.lineTo(Math.min(clampedX + bw - 4, tailCX + 5), bubbleBottomY);
  ctx.stroke();

  // Text
  ctx.fillStyle = '#1a1a1a';
  ctx.font = `bold ${FONT_SIZE}px 'Courier New', monospace`;
  ctx.textBaseline = 'top';
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], clampedX + PAD_X, clampedY + PAD_Y + i * LINE_H);
  }
}

function drawAgents() {
  // Sort agents by y so lower agents draw on top (isometric-ish depth)
  const sorted = [...agents].sort((a, b) => a.y - b.y);

  for (const agent of sorted) {
    const cx = Math.round(agent.x);
    const cy = Math.round(agent.y);

    drawAgentSprite(cx, cy, agent.id, agent.walkFrame);

    // Working cursor blink
    if (agent.state === 'working' && agent.cursorVisible) {
      ctx.fillStyle = '#00ff00';
      ctx.fillRect(gx(cx + 5), gy(cy - 14), PIXEL, 4 * PIXEL);
    }

    // Speech bubble
    if (agent.bubble) {
      drawBubble(cx, cy, agent.bubble.text);
    }
  }
}

// ============================================================
// MAIN DRAW
// ============================================================

function draw() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.imageSmoothingEnabled = false;

  drawWalls();
  drawWallDetails();
  drawFloor();
  drawFurniture();
  drawAgents();
}

// ============================================================
// ACTIVITY LOG
// ============================================================

const activityLog = document.getElementById('activity-log');
const MAX_LOG = 50;
let logEntries = [];

function padZero(n) { return String(n).padStart(2, '0'); }

function getTimestamp() {
  const now = new Date();
  return `${padZero(now.getHours())}:${padZero(now.getMinutes())}:${padZero(now.getSeconds())}`;
}

function addLog(fromId, toId, text) {
  const fromColor = AGENT_COLORS[fromId]?.primary || '#888';
  const fromName = AGENT_COLORS[fromId]?.name || fromId;
  const toName = toId ? AGENT_COLORS[toId]?.name || toId : null;
  const ts = getTimestamp();

  const entry = { fromId, fromColor, fromName, toId, toName, text, ts };
  logEntries.unshift(entry);
  if (logEntries.length > MAX_LOG) logEntries.pop();

  renderLog();
}

function renderLog() {
  const html = logEntries.map(e => `
    <div class="log-entry">
      <span class="log-ts">[${e.ts}]</span>
      <div class="log-agent-line">
        <span class="log-dot" style="background:${e.fromColor}"></span>
        <span class="log-from" style="color:${e.fromColor}">${e.fromName}</span>
        ${e.toName && e.toName !== e.fromName ? `<span class="log-arrow">→</span><span class="log-to">${e.toName}</span>` : ''}
      </div>
      <div class="log-text">"${escHtml(e.text)}"</div>
    </div>
  `).join('');
  activityLog.innerHTML = html;
}

// ============================================================
// AGENT STATUS PANEL
// ============================================================

const statusRows = document.getElementById('status-rows');

function renderStatusPanel() {
  const html = agents.map(agent => {
    const col = AGENT_COLORS[agent.id];
    const stateClass = agent.state;
    return `
      <div class="status-agent-row">
        <span class="status-dot" style="background:${col.primary}"></span>
        <span class="status-agent-name">${col.name}</span>
        <span class="status-state ${stateClass}">${agent.state}</span>
      </div>
    `;
  }).join('');
  statusRows.innerHTML = html;
}

// ============================================================
// GAME LOOP
// ============================================================

let lastFrameTime = 0;
let tickAccum = 0;
const TICK_MS = FRAME_MS; // 1 tick per frame

function gameLoop(timestamp) {
  const elapsed = timestamp - lastFrameTime;

  if (elapsed >= FRAME_MS) {
    lastFrameTime = timestamp - (elapsed % FRAME_MS);

    tickAgents();
    draw();
    renderStatusPanel();
  }

  requestAnimationFrame(gameLoop);
}

// ============================================================
// TECHNICAL PANEL
// ============================================================

let techVisible = false;

function toggleTech() {
  techVisible = !techVisible;
  document.getElementById('tech-panel').classList.toggle('visible', techVisible);
  document.getElementById('toggle-arrow').classList.toggle('open', techVisible);
}

async function loadMemory() {
  const errEl = document.getElementById('tech-error');
  errEl.textContent = '';
  try {
    const resp = await fetch('../memory/team_memory.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    renderTechDashboard(data);
  } catch (e) {
    errEl.textContent = `Could not load team_memory.json: ${e.message}`;

}

function renderTechDashboard(data) {
  const dash = document.getElementById('tech-dashboard');
  dash.classList.add('visible');

  const ps = data.project_status || {};
  document.getElementById('t-badge').textContent = ps.phase || '—';
  document.getElementById('t-phase').textContent = ps.phase || '—';
  document.getElementById('t-summary').textContent = ps.summary || '—';
  document.getElementById('t-date').textContent = ps.last_updated || '—';

  const decisions = data.active_decisions || [];
  const decisionsEl = document.getElementById('t-decisions');
  if (decisions.length === 0) {
    decisionsEl.textContent = 'No active decisions.';
  } else {
    decisionsEl.innerHTML = decisions.map(d => `<span class="tech-tag">${escHtml(d)}</span>`).join('');
  }

  const updates = data.recent_updates || [];
  document.getElementById('t-updates').innerHTML = updates.slice().reverse().map(u =>
    `<li><span class="tech-date-col">${escHtml(u.date || '?')}</span><span class="tech-note-col">${escHtml(u.note || '')}</span></li>`
  ).join('');

  const notes = data.agent_notes || {};
  document.getElementById('t-agent-notes').innerHTML = Object.entries(notes).map(([agent, note]) =>
    `<div class="tech-agent-row"><span class="tech-agent-name">${escHtml(agent)}</span><span class="tech-agent-note">${escHtml(note)}</span></div>`
  ).join('');
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ============================================================
// TASK MANAGER
// ============================================================

let taskData = { backlog: [], active: [], completed: [] };
let tasksVisible = false;

// Toggle the task panel open/closed
function toggleTasks() {
  tasksVisible = !tasksVisible;
  document.getElementById('task-panel').classList.toggle('visible', tasksVisible);
  if (tasksVisible) {
    loadTasks();
  }
}

// Derive a human-readable label from a task filename like "2026-03-27-my-task.md"
function taskLabel(filename) {
  // Strip date prefix (YYYY-MM-DD-) and .md extension
  let name = filename.replace(/^\d{4}-\d{2}-\d{2}-/, '').replace(/\.md$/, '');
  // Replace hyphens with spaces and capitalize first letter
  name = name.replace(/-/g, ' ');
  return name.charAt(0).toUpperCase() + name.slice(1);
}

// Extract the agent from task file markdown content (cached per filename)
// We fetch content lazily and cache it to avoid hammering the server
const taskContentCache = {};

async function fetchTaskContent(filename) {
  if (taskContentCache[filename]) return taskContentCache[filename];
  try {
    const resp = await fetch(`/api/tasks/${encodeURIComponent(filename)}`);
    if (!resp.ok) return null;
    const text = await resp.text();
    taskContentCache[filename] = text;
    return text;
  } catch (e) {
    return null;
  }
}

function parseAgentFromContent(content) {
  if (!content) return null;
  const match = content.match(/^\*\*Agent:\*\*\s*(.+)$/m);
  return match ? match[1].trim() : null;
}

async function loadTasks() {
  const errEl = document.getElementById('task-error');
  errEl.textContent = '';
  try {
    const resp = await fetch('/api/tasks');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    taskData = await resp.json();
    await renderTaskManager();
  } catch (e) {
    errEl.textContent = 'Start server.py to enable task management.';
  }
}

async function createTask(title, agent, description) {
  const resp = await fetch('/api/tasks', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, agent, description }),
  });
  if (!resp.ok) {
    const data = await resp.json().catch(() => ({}));
    throw new Error(data.error || `HTTP ${resp.status}`);
  }
  return resp.json();
}

async function assignTask(filename, agent) {
  const resp = await fetch('/api/tasks/assign', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ filename, agent }),
  });
  if (!resp.ok) {
    const data = await resp.json().catch(() => ({}));
    throw new Error(data.error || `HTTP ${resp.status}`);
  }
  // Invalidate cache since content changed
  delete taskContentCache[filename];
  return resp.json();
}

async function doneTask(filename) {
  const resp = await fetch('/api/tasks/done', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ filename }),
  });
  if (!resp.ok) {
    const data = await resp.json().catch(() => ({}));
    throw new Error(data.error || `HTTP ${resp.status}`);
  }
  delete taskContentCache[filename];
  return resp.json();
}

async function handleCreateTask() {
  const errEl = document.getElementById('task-form-error');
  errEl.textContent = '';
  const title = document.getElementById('tf-title').value.trim();
  const agent = document.getElementById('tf-agent').value;
  const desc = document.getElementById('tf-desc').value.trim();

  if (!title) {
    errEl.textContent = 'Title is required.';
    return;
  }

  try {
    await createTask(title, agent, desc);
    document.getElementById('tf-title').value = '';
    document.getElementById('tf-desc').value = '';
    await loadTasks();
  } catch (e) {
    errEl.textContent = `Error: ${e.message}`;
  }
}

async function handleAssign(filename, selectEl) {
  const agent = selectEl.value;
  try {
    await assignTask(filename, agent);
    await loadTasks();
  } catch (e) {
    document.getElementById('task-error').textContent = `Assign failed: ${e.message}`;
  }
}

async function handleDone(filename) {
  try {
    await doneTask(filename);
    await loadTasks();
  } catch (e) {
    document.getElementById('task-error').textContent = `Done failed: ${e.message}`;
  }
}

// Render a colored dot for the agent
function agentDotHtml(agentId) {
  const color = AGENT_COLORS[agentId]?.primary || '#666';
  return `<span class="task-agent-dot" style="background:${color}"></span>`;
}

// Inline agent select dropdown for backlog cards
function agentSelectHtml(forAssign, filename) {
  const id = `assign-sel-${filename.replace(/\./g, '-')}`;
  const options = Object.entries(AGENT_COLORS)
    .map(([k, v]) => `<option value="${k}">${v.name}</option>`)
    .join('');
  return `<select class="task-select" id="${escHtml(id)}" style="font-size:10px;padding:2px 4px;">${options}</select>
    <button class="task-btn-assign" onclick="handleAssign('${escHtml(filename)}', document.getElementById('${escHtml(id)}'))">Assign</button>`;
}

async function renderTaskManager() {
  // Fetch agent info for all visible tasks in parallel (up to 30 per column)
  const allFiles = [
    ...taskData.backlog.slice(0, 30),
    ...taskData.active.slice(0, 30),
    ...taskData.completed.slice(0, 20),
  ];
  await Promise.all(allFiles.map(f => fetchTaskContent(f)));

  function renderCard(filename, bucket) {
    const label = taskLabel(filename);
    const content = taskContentCache[filename];
    const agent = parseAgentFromContent(content) || 'unassigned';
    const agentInfo = AGENT_COLORS[agent];
    const agentLabel = agentInfo ? agentInfo.name : agent;
    const agentColor = agentInfo ? agentInfo.primary : '#666';

    let actionsHtml = '';
    if (bucket === 'backlog') {
      actionsHtml = `<div class="task-card-actions">${agentSelectHtml(true, filename)}</div>`;
    } else if (bucket === 'active') {
      actionsHtml = `<div class="task-card-actions">
        <button class="task-btn-done" onclick="handleDone('${escHtml(filename)}')">&#10003; Done</button>
        <button class="run-btn" onclick="runTask('${escHtml(filename)}', '${escHtml(agent)}')">&#9654; Run</button>
      </div>`;
    }

    return `
      <div class="task-card" title="${escHtml(filename)}">
        <div class="task-card-name">${escHtml(label)}</div>
        <div class="task-card-agent">
          ${agentDotHtml(agent)}
          <span style="color:${agentColor}">${escHtml(agentLabel)}</span>
        </div>
        ${actionsHtml}
      </div>
    `;
  }

  for (const bucket of ['backlog', 'active', 'completed']) {
    const el = document.getElementById(`task-col-${bucket}`);
    const files = taskData[bucket] || [];
    if (files.length === 0) {
      el.innerHTML = `<div class="task-col-empty">empty</div>`;
    } else {
      // Show most recent first (files are YYYY-MM-DD sorted, so reverse)
      el.innerHTML = [...files].reverse().map(f => renderCard(f, bucket)).join('');
    }
  }
}

// ============================================================
// RUNNING AGENTS — track which agent ids have active claude runs
// ============================================================

let runningAgents = new Set();
let terminalPollInterval = null;

// Poll /api/run/status every 3 s and keep runningAgents in sync
function pollRunStatus() {
  setInterval(async () => {
    try {
      const r = await fetch('/api/run/status');
      if (!r.ok) return;
      const d = await r.json();
      runningAgents = new Set(
        // Map filenames to agent ids via running_tasks agent field — we can't
        // know the agent id directly from the filename, so we resolve it from
        // the task content cache as a best-effort lookup.
        (d.running || []).map(fname => {
          const content = taskContentCache[fname];
          return parseAgentFromContent(content) || null;
        }).filter(Boolean)
      );
    } catch (e) {
      // Server may not be running — ignore silently
    }
  }, 3000);
}

async function runTask(filename, agent) {
  // Show terminal panel
  document.getElementById('terminal-panel').style.display = 'block';
  document.getElementById('terminal-output').innerHTML = '';
  document.getElementById('terminal-title').textContent = `\u25CF ${agent.toUpperCase()} \u2014 ${taskLabel(filename)}`;
  document.getElementById('terminal-status').textContent = 'Starting...';

  // Scroll terminal into view
  document.getElementById('terminal-panel').scrollIntoView({ behavior: 'smooth' });

  try {
    const res = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename, agent }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed to start');

    // Mark this agent as running in the canvas overlay
    runningAgents.add(agent);

    // Start polling for output
    let linesShown = 0;
    clearInterval(terminalPollInterval);
    terminalPollInterval = setInterval(async () => {
      const r = await fetch(`/api/run/output?task_id=${encodeURIComponent(filename)}`);
      const d = await r.json();

      const output = document.getElementById('terminal-output');
      const newLines = d.lines.slice(linesShown);
      newLines.forEach(line => {
        const div = document.createElement('div');
        div.textContent = line;
        // Color-code certain lines
        if (line.startsWith('\u2713') || line.includes('completed') || line.includes('Done')) {
          div.style.color = '#2ecc71';
        } else if (line.startsWith('Error') || line.startsWith('\u2717')) {
          div.style.color = '#e74c3c';
        } else if (line.startsWith('>') || line.startsWith('$')) {
          div.style.color = '#3498db';
        }
        output.appendChild(div);
      });
      linesShown = d.lines.length;
      output.scrollTop = output.scrollHeight;

      if (d.done) {
        clearInterval(terminalPollInterval);
        document.getElementById('terminal-status').textContent = '\u2713 Done';
        document.getElementById('terminal-status').style.color = '#2ecc71';
        // Remove from canvas glow
        runningAgents.delete(agent);
        // Reload tasks after a short delay
        setTimeout(() => loadTasks().then(renderTaskManager), 1500);
      } else {
        document.getElementById('terminal-status').textContent = `Running... (${linesShown} lines)`;
      }
    }, 800);

  } catch (e) {
    document.getElementById('terminal-output').textContent = `Error: ${e.message}\n\nMake sure server.py is running.`;
    document.getElementById('terminal-status').textContent = 'Failed';
  }
}

function closeTerminal() {
  clearInterval(terminalPollInterval);
  document.getElementById('terminal-panel').style.display = 'none';
}
