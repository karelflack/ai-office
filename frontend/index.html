<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Office</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center;
           font-family: 'Courier New', monospace; color: #eee; height: 100vh; overflow: hidden; }
    #header { width: 100%; padding: 8px 20px; background: #16213e;
              display: flex; justify-content: space-between; align-items: center;
              border-bottom: 2px solid #0f3460; }
    #header h1 { font-size: 18px; color: #e94560; letter-spacing: 3px; }
    #mode-badge { font-size: 11px; padding: 3px 8px; border-radius: 3px;
                  background: #0f3460; color: #4ecdc4; }
    #main { display: flex; flex: 1; width: 100%; overflow: hidden; }
    #game-container { flex: 1; display: flex; justify-content: center; align-items: center; }
    #sidebar { width: 280px; background: #16213e; border-left: 2px solid #0f3460;
               display: flex; flex-direction: column; overflow: hidden; }
    #sidebar-header { padding: 10px 14px; background: #0f3460; font-size: 13px;
                      color: #4ecdc4; letter-spacing: 2px; }
    #task-log { flex: 1; overflow-y: auto; padding: 10px; font-size: 11px; line-height: 1.6; min-height: 0; }
    #final-panel { border-top: 2px solid #0f3460; padding: 10px; background: #0d1b2e; max-height: 160px; overflow-y: auto; display: none; }
    #final-panel-header { font-size: 10px; color: #ffd93d; letter-spacing: 2px; margin-bottom: 6px; }
    #final-text { font-size: 11px; color: #e0e0e0; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .log-entry { margin-bottom: 8px; padding: 6px 8px; border-radius: 3px;
                 border-left: 3px solid #333; animation: fadeIn 0.3s ease; }
    .log-entry.boss    { border-color: #e94560; background: #1a0a10; }
    .log-entry.worker  { border-color: #4ecdc4; background: #0a1a1a; }
    .log-entry.result  { border-color: #ffd93d; background: #1a1a0a; }
    .log-entry.system  { border-color: #555;    background: #111; color: #888; }
    @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; } }
    #input-area { padding: 10px; border-top: 2px solid #0f3460; }
    #task-input { width: 100%; background: #0f3460; border: 1px solid #4ecdc4; color: #fff;
                  padding: 8px; font-family: 'Courier New', monospace; font-size: 12px;
                  border-radius: 3px; resize: none; height: 60px; }
    #send-btn { width: 100%; margin-top: 6px; padding: 7px; background: #e94560;
                color: #fff; border: none; cursor: pointer; font-family: 'Courier New', monospace;
                font-size: 12px; letter-spacing: 2px; border-radius: 3px; }
    #send-btn:hover { background: #c73652; }
    #send-btn:disabled { background: #555; cursor: not-allowed; }
    #tooltip { position: fixed; background: #0f3460; border: 1px solid #4ecdc4;
               padding: 8px 12px; border-radius: 4px; font-size: 11px; pointer-events: none;
               display: none; z-index: 100; min-width: 160px; }
    #tooltip .agent-name { font-size: 13px; color: #4ecdc4; font-weight: bold; margin-bottom: 4px; }
    #tooltip .agent-state { color: #ffd93d; }
    #tooltip .agent-task  { color: #ccc; margin-top: 4px; font-size: 10px; max-width: 200px; }
  </style>
</head>
<body>
  <div id="header">
    <h1>AI OFFICE</h1>
    <span id="mode-badge">CONNECTING...</span>
  </div>
  <div id="main">
    <div id="game-container">
      <canvas id="office-canvas"></canvas>
    </div>
    <div id="sidebar">
      <div id="sidebar-header">ACTIVITY LOG</div>
      <div id="task-log"></div>
      <div id="final-panel">
        <div id="final-panel-header">FINAL ANSWER</div>
        <div id="final-text"></div>
      </div>
      <div id="input-area">
        <textarea id="task-input" placeholder="Type a task for the boss..."></textarea>
        <button id="send-btn">SEND TASK</button>
      </div>
    </div>
  </div>
  <div id="tooltip">
    <div class="agent-name" id="tt-name"></div>
    <div class="agent-state" id="tt-state"></div>
    <div class="agent-task" id="tt-task"></div>
  </div>

  <script src="/static/game.js"></script>
</body>
</html>
